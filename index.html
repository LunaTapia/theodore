<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>多角色聊天</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1f;
            --surface: rgba(40, 40, 48, 0.75);
            --surface-solid: #2c2c34;
            --card: rgba(50, 50, 58, 0.7);
            --text: #e8e8ec;
            --text-secondary: #b0b0ba;
            --text-tertiary: #7a7a86;
            --accent: #5e9eff;
            --accent-soft: rgba(94, 158, 255, 0.2);
            --bubble-me: rgba(94, 158, 255, 0.35);
            --bubble-other: rgba(60, 60, 72, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ff5e5e;
            --danger-soft: rgba(255, 94, 94, 0.2);
            --success: #5ecb8a;
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --font: 'ZCOOL KuaiLe', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 12px);
            --header-h: 54px;
            --bottom-nav-h: 62px;
            --input-area-h: 130px;
            --transition: 0.25s cubic-bezier(0.25, 0, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        *::-webkit-scrollbar {
            width: 3px;
        }
        *::-webkit-scrollbar-track {
            background: transparent;
        }
        *::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
            letter-spacing: 0.3px;
            -webkit-font-smoothing: antialiased;
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 520px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background: var(--bg);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.4);
        }

        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: var(--bottom-nav-h);
            padding-bottom: var(--safe-bottom);
            background: var(--surface);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 100;
            gap: 4px;
        }
        .bottom-nav .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 8px;
            border-radius: var(--radius-xl);
            cursor: pointer;
            transition: var(--transition);
            font-size: 15px;
            color: var(--text-tertiary);
            letter-spacing: 0.5px;
            background: transparent;
            border: none;
            font-family: var(--font);
        }
        .bottom-nav .nav-item.active {
            color: var(--accent);
            background: var(--accent-soft);
            font-weight: bold;
        }
        .bottom-nav .nav-item:active {
            transform: scale(0.94);
            opacity: 0.8;
        }
        .nav-icon {
            font-size: 20px;
            line-height: 1;
        }

        .main-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .tab-panel {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: absolute;
            inset: 0;
        }
        .tab-panel.active {
            display: flex;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            height: var(--header-h);
            flex-shrink: 0;
            background: var(--surface);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-bottom: 1px solid var(--border);
            z-index: 20;
            gap: 10px;
        }
        .header-title {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.8px;
            text-align: center;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: var(--transition);
            flex-shrink: 0;
            font-family: var(--font);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .header-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.12);
        }
        .header-btn.primary {
            background: var(--accent-soft);
            border-color: rgba(94, 158, 255, 0.3);
            color: var(--accent);
        }

        .chat-list-view {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .chat-list-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .chat-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition);
            background: var(--card);
            border: 1px solid transparent;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        .chat-list-item:active {
            transform: scale(0.985);
            background: rgba(255, 255, 255, 0.06);
        }
        .chat-list-item.dragging {
            opacity: 0.5;
            transform: scale(0.95);
            border: 1px dashed var(--accent);
            z-index: 30;
            background: var(--surface-solid);
        }
        .chat-list-item.drag-over {
            border-color: var(--accent);
            background: var(--accent-soft);
            box-shadow: 0 0 20px rgba(94, 158, 255, 0.25);
        }
        .chat-list-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 0;
            overflow: hidden;
            object-fit: cover;
        }
        .chat-list-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .chat-list-name {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-list-preview {
            font-size: 13px;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-list-badge {
            font-size: 11px;
            background: var(--accent-soft);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.4px;
            flex-shrink: 0;
        }
        .drag-handle {
            cursor: grab;
            font-size: 16px;
            color: var(--text-tertiary);
            padding: 4px;
            flex-shrink: 0;
            opacity: 0.5;
            transition: var(--transition);
        }

        .chat-detail-view {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .chat-detail-view.active {
            display: flex;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        .msg-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            max-width: 88%;
            animation: msgIn 0.2s ease-out;
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg-row.me {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg-row.other {
            align-self: flex-start;
        }
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 0;
            overflow: hidden;
            object-fit: cover;
        }
        .msg-bubble-wrap {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .msg-bubble {
            padding: 10px 14px;
            border-radius: var(--radius-lg);
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            letter-spacing: 0.4px;
            cursor: default;
        }
        .msg-row.me .msg-bubble {
            background: var(--bubble-me);
            border-bottom-right-radius: 6px;
            color: #d0e4ff;
        }
        .msg-row.other .msg-bubble {
            background: var(--bubble-other);
            border-bottom-left-radius: 6px;
            color: var(--text);
        }
        .msg-reply-preview {
            font-size: 12px;
            color: var(--text-tertiary);
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            margin-bottom: 3px;
            border-left: 3px solid var(--accent);
            letter-spacing: 0.3px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .msg-image {
            max-width: 220px;
            max-height: 280px;
            border-radius: var(--radius);
            cursor: pointer;
            object-fit: cover;
            display: block;
        }
        .msg-file {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 0.3px;
            text-decoration: none;
            color: var(--text);
        }

        .context-menu {
            position: fixed;
            z-index: 999;
            background: var(--surface-solid);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 2px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            min-width: 140px;
        }
        .context-menu.show {
            display: flex;
        }
        .context-menu-item {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.4px;
            transition: var(--transition);
            white-space: nowrap;
            background: transparent;
            border: none;
            color: var(--text);
            text-align: left;
            font-family: var(--font);
        }
        .context-menu-item:active {
            background: rgba(255, 255, 255, 0.08);
        }
        .context-menu-item.danger {
            color: var(--danger);
        }

        .sender-selector {
            display: flex;
            gap: 10px;
            padding: 8px 14px;
            overflow-x: auto;
            flex-shrink: 0;
            align-items: center;
            border-top: 1px solid var(--border);
            background: rgba(30, 30, 38, 0.6);
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .sender-selector::-webkit-scrollbar {
            height: 0;
        }
        .sender-chip {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            padding: 4px 6px;
            border-radius: var(--radius);
            border: 2px solid transparent;
            background: transparent;
            font-family: var(--font);
            color: var(--text-secondary);
            font-size: 10px;
            letter-spacing: 0.3px;
        }
        .sender-chip.active {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: var(--radius-lg);
        }
        .sender-chip:active {
            transform: scale(0.9);
        }
        .sender-chip-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 0;
            overflow: hidden;
            object-fit: cover;
            transition: var(--transition);
        }
        .sender-chip.active .sender-chip-avatar {
            box-shadow: 0 0 14px rgba(94, 158, 255, 0.5);
            transform: scale(1.1);
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            padding-bottom: calc(8px + var(--safe-bottom));
            flex-shrink: 0;
            background: var(--surface);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-top: 1px solid var(--border);
        }
        .input-field {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 10px 16px;
            font-size: 15px;
            color: var(--text);
            outline: none;
            font-family: var(--font);
            letter-spacing: 0.4px;
            transition: var(--transition);
            -webkit-user-select: text;
            user-select: text;
        }
        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(94, 158, 255, 0.1);
        }
        .input-field::placeholder {
            color: var(--text-tertiary);
        }
        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font);
        }
        .send-btn:active {
            transform: scale(0.88);
            opacity: 0.8;
        }
        .attach-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            font-size: 20px;
            transition: var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font);
        }
        .attach-btn:active {
            transform: scale(0.88);
            background: rgba(255, 255, 255, 0.1);
        }
        .reply-preview-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(94, 158, 255, 0.08);
            border-left: 3px solid var(--accent);
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .reply-preview-bar .cancel-reply {
            cursor: pointer;
            font-size: 16px;
            margin-left: auto;
            padding: 4px 8px;
            border-radius: 50%;
            transition: var(--transition);
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            font-family: var(--font);
        }

        .attach-popup {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 300;
            background: var(--surface-solid);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            padding: 16px;
            padding-bottom: calc(16px + var(--safe-bottom));
            display: none;
            flex-direction: column;
            gap: 6px;
            border-top: 1px solid var(--border);
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.4);
            max-width: 520px;
            margin: 0 auto;
        }
        .attach-popup.show {
            display: flex;
        }
        .attach-popup-item {
            padding: 14px 18px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 15px;
            letter-spacing: 0.4px;
            transition: var(--transition);
            background: var(--card);
            border: none;
            color: var(--text);
            text-align: center;
            font-family: var(--font);
        }
        .attach-overlay {
            position: fixed;
            inset: 0;
            z-index: 299;
            background: rgba(0, 0, 0, 0.5);
            display: none;
        }
        .attach-overlay.show {
            display: block;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-lg);
            background: var(--card);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .contact-item:active {
            transform: scale(0.985);
            background: rgba(255, 255, 255, 0.05);
        }
        .contact-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 0;
            overflow: hidden;
            object-fit: cover;
        }
        .contact-info {
            flex: 1;
            min-width: 0;
        }
        .contact-name {
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.4px;
        }
        .add-contact-btn {
            margin: 8px 10px;
            padding: 14px;
            border-radius: var(--radius-lg);
            background: var(--accent-soft);
            border: 2px dashed rgba(94, 158, 255, 0.35);
            color: var(--accent);
            cursor: pointer;
            text-align: center;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: var(--transition);
            font-family: var(--font);
        }

        .profile-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .profile-card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid var(--border);
        }
        .profile-avatar-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 0;
            overflow: hidden;
            object-fit: cover;
            cursor: pointer;
            transition: var(--transition);
        }
        .profile-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 15px;
            color: var(--text);
            outline: none;
            font-family: var(--font);
            letter-spacing: 0.4px;
            -webkit-user-select: text;
            user-select: text;
        }
        .btn {
            padding: 12px 20px;
            border-radius: var(--radius-xl);
            cursor: pointer;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: var(--transition);
            border: none;
            font-family: var(--font);
            text-align: center;
            font-weight: bold;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-upload {
            background: var(--success);
            color: #fff;
            border: none;
        }
        .btn-upload:active {
            opacity: 0.75;
            transform: scale(0.96);
        }

        .search-view {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .search-view.active {
            display: flex;
        }
        .search-input-wrap {
            padding: 10px 14px;
            flex-shrink: 0;
            background: var(--surface);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 10px 16px;
            font-size: 15px;
            color: var(--text);
            outline: none;
            font-family: var(--font);
            -webkit-user-select: text;
            user-select: text;
        }
        .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .search-result-item {
            padding: 12px 14px;
            border-radius: var(--radius);
            background: var(--card);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }
        .search-result-chat {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 3px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 400;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: var(--surface-solid);
            border-radius: var(--radius-xl);
            padding: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal .checkbox-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        .modal .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius);
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: var(--surface-solid);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: var(--radius-xl);
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            letter-spacing: 0.4px;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="main-content" id="mainContent">
            <div class="tab-panel active" id="tab-chat">
                <div class="chat-list-view" id="chatListView">
                    <div class="header">
                        <button class="header-btn" id="btnSearch">🔍</button>
                        <span class="header-title">聊天</span>
                        <button class="header-btn primary" id="btnCreateGroup">+</button>

                </div>
                <div class="chat-detail-view" id="chatDetailView">
                    <div class="header">
                        <button class="header-btn" id="btnBack">←</button>
                        <span class="header-title" id="chatDetailTitle">对话</span>
                        <div style="width:38px;"></div>
                    </div>
                    <div class="messages-container" id="messagesContainer"></div>
                    <div class="reply-preview-bar" id="replyPreviewBar" style="display:none;">
                        <span id="replyPreviewText"></span>
                        <button class="cancel-reply" id="btnCancelReply">✕</button>

                    <div class="sender-selector" id="senderSelector"></div>
                    <div class="input-area">
