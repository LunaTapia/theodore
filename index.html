<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>语C · 多角色聊天</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============ 主题与基础(可爱黑+半透明深灰+蓝灰)============ */
:root{
  --bg-0:#0c0c14;      /* 极深黑 */
  --bg-1:#10101a;      /* 几乎黑 */
  --bg-glass:rgba(14,14,22,0.92);  /* 不透明深色玻璃 */
  --glass:rgba(255,255,255,0.025);
  --glass-strong:rgba(255,255,255,0.05);
  --glass-hover:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.06);
  --border-soft:rgba(255,255,255,0.04);
  --text:#e8eaf0;
  --text-dim:rgba(232,234,240,0.80);
  --text-faint:rgba(232,234,240,0.60);
  --blue-gray:rgba(90,110,160,0.55);  /* 蓝灰色调 */
  --blue-gray-light:rgba(120,145,200,0.25);
  --me-1:color-mix(in oklch, var(--accent) 80%, white 20%); --me-2:color-mix(in oklch, var(--accent) 50%, white 50%);    /* 跟随 --accent，随壁纸主题变色 */
  --bubble-other:rgba(32,32,45,0.78);
  --accent:#8b7cf5;
  --accent-glow:color-mix(in oklch, var(--accent) 25%, transparent);
  --danger:#ff6b7a;
  --ok:#5fd4a0;
  --radius:18px;
  --nav-h:64px;

  /* ============ 深色果冻玻璃按钮系统 ============ */
  --glass-btn-bg:rgba(255,255,255,0.10);      /* 变透：底色半透明 */
  --glass-btn-bd:rgba(255,255,255,0.12);      /* 边框微亮 */
  --glass-btn-shine:rgba(255,255,255,0.15);   /* 顶光：玻璃倒角反光 */
  --glass-btn-shadow:rgba(0,0,0,0.35);        /* 浮起：底部外阴影 */
  --glass-btn-blur:20px;
  --glass-btn-inset-dark:rgba(0,0,0,0.20);    /* 底部内阴影压暗 */
}
@keyframes jelly-press{
  0%  {transform:scale(1) translateY(0);}
  30% {transform:scale(0.95) translateY(1px);}
  100%{transform:scale(1) translateY(0);}
}
.glass-btn{
  background:var(--glass-btn-bg);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  border:1px solid var(--glass-btn-bd);
  box-shadow:
    inset 0 0.5px 0 0 var(--glass-btn-shine),          /* 顶光 */
    inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),    /* 底部压暗 */
    0 4px 12px var(--glass-btn-shadow);                /* 浮起外阴影 */
  transition:box-shadow .15s,background .15s,transform .15s;
}
.glass-btn:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 6px 18px rgba(0,0,0,0.45);}
.glass-btn:active,.glass-btn.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.08),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 2px 6px rgba(0,0,0,0.25);transform:scale(0.97);}
.glass-btn.active{background:rgba(255,255,255,0.18);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 3px 10px rgba(0,0,0,0.30),0 0 0 1px rgba(255,255,255,0.10) inset;}
  --font: "Zen Maru Gothic","M PLUS Rounded 1c","Nunito","Quicksand","PingFang SC","Hiragino Sans GB","Microsoft YaHei","微软雅黑",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;min-height:100%;height:100%;}
#chat-list,#contact-list{padding:6px 10px 0;}
body{
  font-family:var(--font);
  color:var(--text);
  background:
    radial-gradient(1400px 900px at 10% -5%, rgba(80,100,180,0.05), transparent 55%),
    radial-gradient(1100px 800px at 105% 105%, rgba(60,80,160,0.04), transparent 50%),
    radial-gradient(800px 600px at 50% 50%, rgba(50,70,150,0.02), transparent 60%),
    linear-gradient(165deg,var(--bg-1),var(--bg-0));
  background-attachment:fixed;
  overflow-y:auto;
  -webkit-user-select:none;user-select:none;
  font-size:15px;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
input,textarea{font-family:inherit;color:inherit;}
img{display:block;-webkit-user-drag:none;}
::-webkit-scrollbar{width:0;height:0;}

/* ============ 壁纸：独立 fixed 元素，绕过 iOS background-attachment:fixed 失效 bug ============ */
#wallpaper{position:fixed;inset:0;z-index:-1;pointer-events:none;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:transparent;}

/* ============ 布局骨架 ============ */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
.view{position:absolute;inset:0;display:none;flex-direction:column;}
.view.active{display:flex;}
#view-chat{flex:1;}

/* 顶部栏 */
.topbar{
  flex:0 0 auto;height:58px;padding-top:env(safe-area-inset-top);
  display:flex;align-items:center;gap:10px;padding-left:16px;padding-right:16px;
  background:transparent;
  border-bottom:none;
  z-index:20;
}
.topbar .title{font-weight:600;font-size:18px;letter-spacing:.3px;font-family:var(--font);}
.topbar .spacer{flex:1;}
.icon-btn{
  width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 4px 12px var(--glass-btn-shadow);
  transition:transform .15s,box-shadow .15s,background .15s;
}
.icon-btn:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 6px 18px rgba(0,0,0,0.45);}
.icon-btn:active,.icon-btn.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.08),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 2px 6px rgba(0,0,0,0.25);transform:scale(0.93);}
.icon-btn svg{width:20px;height:20px;fill:none;stroke:var(--text);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* 列表滚动区 */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:24px;}

/* ============ 底部导航(悬浮小框) ============ */
#bottomnav{
  position:absolute;left:50%;bottom:calc(14px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  display:flex;gap:6px;
  background:rgba(255,255,255,0.04);  /* 取消原来不透明黑底，改为高透明白玻璃，与其他 glass-btn 同体系 */
  backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);
  border:1px solid rgba(255,255,255,0.08);border-radius:22px;
  padding:6px 10px;z-index:30;
  box-shadow:0 8px 32px rgba(0,0,0,.25);  /* 阴影减淡 */
  transition:opacity .25s,transform .25s;
}
#bottomnav.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(20px);}
.nav-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  min-width:56px;padding:7px 10px;border-radius:16px;
  color:rgba(232,234,240,0.90);cursor:pointer;
  text-shadow:0 1px 2px rgba(0,0,0,0.4);
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 4px 12px var(--glass-btn-shadow);
  transition:background .15s,box-shadow .15s,transform .15s;
}
.nav-item:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 6px 18px rgba(0,0,0,0.45);}
.nav-item:active,.nav-item.pressing{animation:jelly-press .22s ease forwards;}
.nav-item.active{color:#fff;background:rgba(255,255,255,0.18);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 3px 10px rgba(0,0,0,0.30),0 0 0 1px rgba(255,255,255,0.10) inset;text-shadow:0 1px 3px rgba(0,0,0,0.5);}
.nav-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-item .lbl{font-size:10px;font-weight:600;}

/* ============ 聊天列表 ============ */
.list-section{padding:8px 14px 0;}
.search-wrap{margin:8px 12px 4px;position:relative;}
.search-wrap input{
  width:100%;height:42px;border-radius:14px;border:1px solid var(--border-soft);
  background:var(--glass);padding:0 14px 0 40px;font-size:15px;outline:none;
}
.search-wrap .s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--text-dim);fill:none;stroke-width:2;stroke-linecap:round;}
.chat-item,.contact-item{
  display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:14px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  box-shadow:
    inset 0 0.5px 0 0 rgba(255,255,255,0.10),
    inset 0 -0.5px 0 0 rgba(0,0,0,0.10),
    0 2px 8px rgba(0,0,0,0.20);
  transition:background .15s,box-shadow .15s,transform .15s;
  position:relative;touch-action:pan-y;-webkit-tap-highlight-color:transparent;
  margin-bottom:6px;
}
.chat-item:hover,.contact-item:hover{background:rgba(255,255,255,0.10);transform:translateY(-1px);box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.12),inset 0 -0.5px 0 0 rgba(0,0,0,0.10),0 4px 12px rgba(0,0,0,0.30);}
.chat-item:active,.contact-item:active,.chat-item.pressing,.contact-item.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.06),inset 0 -0.5px 0 0 rgba(0,0,0,0.10),0 1px 4px rgba(0,0,0,0.20);}
.avatar{
  width:50px;height:50px;border-radius:50%;flex:0 0 auto;object-fit:cover;
  position:relative;overflow:hidden;
  background:var(--glass-btn-bg);
  border:1px solid var(--glass-btn-bd);
  box-shadow:
    inset 0 0.5px 0 0 var(--glass-btn-shine),
    inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),
    0 4px 12px var(--glass-btn-shadow);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
}
.avatar::before{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,0.10) 0%,transparent 50%);pointer-events:none;z-index:1;}
.avatar::after{content:'';position:absolute;bottom:-3px;left:15%;right:15%;height:6px;background:radial-gradient(ellipse at center top,rgba(0,0,0,0.4) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0;}
.avatar img{width:100%;height:100%;object-fit:cover;display:block;z-index:0;image-rendering:auto;}
.avatar>div,.avatar>span{z-index:0;}
.avatar.sm{width:34px;height:34px;font-size:14px;}
.avatar.xs{width:26px;height:26px;font-size:11px;}
.avatar.med{width:64px;height:64px;font-size:24px;}
.chat-item .avatar,.contact-item .avatar{width:42px;height:42px;font-size:15px;}
.meta{flex:1;min-width:0;}
.meta .name{font-weight:500;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meta .prev{font-size:12.5px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.chat-item .right{text-align:right;color:var(--text-dim);font-size:12px;flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px;font-weight:400;}
.badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:10px;min-width:18px;height:18px;padding:0 5px;display:flex;align-items:center;justify-content:center;}
/* "⋯" 更多按钮：桌面 hover 时变亮，手机常显；点击出菜单，长按/右键仍走原逻辑 */
.more-btn{
  width:26px;height:26px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;line-height:1;color:var(--text-dim);
  cursor:pointer;flex:0 0 auto;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  opacity:0.5;
  transition:all .15s ease;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.chat-item:hover .more-btn,.contact-item:hover .more-btn{opacity:1;background:rgba(255,255,255,0.10);}
.more-btn:hover{background:rgba(255,255,255,0.16) !important;transform:scale(1.08);}
.more-btn:active{animation:jelly-press .22s ease forwards;background:var(--accent) !important;color:#fff !important;}
/* 触屏设备：常显 */
@media (hover:none){.more-btn{opacity:0.85;}}
.drag-ghost{opacity:.4;}
.drag-over-up{box-shadow:0 -2px 0 0 var(--accent);}
.drag-over-down{box-shadow:0 2px 0 0 var(--accent);}
.press-to-drag{opacity:.5;transform:scale(0.97);}

/* ============ 联系人 ============ */
.contact-grid{padding:8px 12px;display:flex;flex-direction:column;gap:2px;}
.contact-grid .contact-item{backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);}


/* ============ 我 ============ */
.me-head{display:flex;flex-direction:column;align-items:center;gap:10px;padding:26px 0 14px;}
.me-name{font-size:22px;font-weight:800;}
.me-sub{font-size:13px;color:var(--text-dim);}
.panel{margin:10px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:18px;overflow:hidden;
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.10),inset 0 -0.5px 0 0 rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.20);
}
.panel .row{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid var(--glass-btn-bd);background:transparent;transition:background .15s;}
.panel .row:hover{background:rgba(255,255,255,0.04);}
.panel .row:last-child{border-bottom:none;}
.panel .row .t{flex:1;font-weight:600;}
.panel .row svg{width:20px;height:20px;stroke:var(--text-dim);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.fab{
  position:absolute;right:18px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);
  width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--me-1),var(--me-2));
  box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.30),inset 0 -0.5px 0 0 rgba(0,0,0,0.15),0 4px 14px rgba(0,0,0,0.40);
  z-index:25;transition:transform .18s,box-shadow .18s;
}
.fab:hover{transform:scale(1.06) translateY(-1px);box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.30),inset 0 -0.5px 0 0 rgba(0,0,0,0.15),0 6px 20px rgba(0,0,0,0.50);}
.fab:active,.fab.pressing{animation:jelly-press .22s ease forwards;}
.fab svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round;}

/* ============ 对话页 ============ */
#convo-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 6px;display:flex;flex-direction:column;gap:3px;
  background:transparent;
  backdrop-filter:none;-webkit-backdrop-filter:none;
}
.day-sep{align-self:center;font-size:11px;color:var(--text-faint);margin:6px 0;padding:2px 10px;background:var(--glass-strong);border-radius:10px;}

/* 消息组:同一发送者连续消息包在一起,垂直堆叠,左边头像占位始终保留(微信/iOS风格) */
.msg-group{display:flex;flex-direction:column;gap:1px;max-width:100%;padding:0 6px;position:relative;z-index:1;margin-top:5px;}
.msg-group.me{align-items:flex-end;}  /* 我整组靠右 */
/* 消息行:头像(固定34px占位) + 气泡 */
.msg-row{display:flex;gap:6px;align-items:flex-end;max-width:88%;border-radius:10px;position:relative;z-index:1;padding:2px 0;}
.msg-row.me{align-self:flex-end;}
.msg-row .av-slot{width:34px;flex:0 0 auto;min-height:1px;}  /* 头像位固定34px,即使空也占位 */
.msg-row.selected{/* 去除选中后的外框：用户只要勾选样式，不要高亮框 */}
.msg-row.selected .select-box{background:var(--accent);border-color:var(--accent);}
.msg-row.selected .select-box svg{opacity:1;stroke:#fff;}
.select-box{
  width:22px;height:22px;flex:0 0 auto;border-radius:50%;border:2px solid var(--border);background:var(--glass-strong);
  display:flex;align-items:center;justify-content:center;align-self:center;margin-right:2px;
  transition:all .15s;
}
.select-box svg{width:14px;height:14px;opacity:.4;stroke:var(--text);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.msg-row:hover{background:rgba(255,255,255,0.03);}
.msg-row.me{justify-content:flex-end;}
.msg-row .av-slot{width:34px;flex:0 0 auto;}
/* 气泡容器:用 fit-content 让短文本一行排完。
   max-width 100% 跟 msg-row 看齐（不再 88% × msg-row 二次压缩成 77%）——
   对方气泡会被 88% 压缩是因为 msg-row 里有 av-slot 34px 分担；
   我方无 av-slot，88% × msg-row 会二次压窄。改用 msg-row 自身的 88% 上限统一。 */
.bubble-wrap{position:relative;width:fit-content;max-width:100%;}
.msg-row.me .bubble-wrap{align-items:flex-end;margin-right:0;margin-left:0;}
.bubble{
  position:relative;padding:8px 12px;border-radius:20px;font-size:14px;line-height:1.45;
  overflow-wrap:break-word;word-wrap:break-word;word-break:normal;
  /* 对方：玻璃质感 = 你的气泡色(--bubble-bg) 兜底为中性灰玻璃；顶光+底暗+弥散阴影+模糊 */
  background:var(--bubble-bg, linear-gradient(180deg, rgba(255,255,255,0.07), rgba(40,42,66,0.42)));
  border:1px solid var(--bubble-border, rgba(110,120,170,.22));
  backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
  box-shadow:
    inset 0 0.5px 0 0 rgba(255,255,255,0.18),
    inset 0 -0.5px 0 0 rgba(0,0,0,0.15),
    0 2px 8px rgba(0,0,0,0.25);
  transition:transform .12s,box-shadow .12s,filter .12s;-webkit-tap-highlight-color:transparent;
}
.bubble-wrap:active .bubble{transform:scale(0.97);box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.10),inset 0 -0.5px 0 0 rgba(0,0,0,0.15),0 1px 4px rgba(0,0,0,0.20);}
.msg-row.me .bubble{
  /* 我方：玻璃质感 = 你的气泡色(--bubble-bg) 兜底为淡紫玻璃(已调暗)；顶光减弱 */
  background:var(--bubble-bg, linear-gradient(180deg, rgba(150,160,255,0.10), rgba(90,100,200,0.30)));
  border:1px solid var(--bubble-border, rgba(150,160,230,.32));
  backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
  box-shadow:
    inset 0 0.5px 0 0 rgba(255,255,255,0.16),
    inset 0 -0.5px 0 0 rgba(0,0,0,0.15),
    0 2px 8px rgba(0,0,0,0.25);
}
/* 气泡尾巴：已删除 */
.bubble img.att{max-width:200px;border-radius:14px;margin-top:2px;image-rendering:-webkit-optimize-contrast;display:block;}
/* 画板气泡：放大到 420px，包裹层让画板深度背景融进气泡圆角 */
.att-draw{display:inline-block;max-width:420px;border-radius:16px;overflow:hidden;background:transparent;margin-top:2px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);}
.att-draw img.att{max-width:100%;width:100%;height:auto;border-radius:0;margin-top:0;display:block;image-rendering:auto;}
/* 气泡里只有画板时：气泡收紧只包裹画板，不填满整行
   不设 max-width（会反向压缩 att-draw）。bubble-wrap 的 max-width:88% 够用 */
.bubble:has(> .att-draw:only-child){display:inline-block!important;width:fit-content!important;padding:6px!important;text-align:center;}
/* 同样要控制外层 bubble-wrap 不被拉成 88% */
.bubble-wrap:has(> .bubble > .att-draw:only-child){width:fit-content!important;}
.bubble .file-chip,.bubble .loc-chip,.bubble .music-chip{
  display:flex;align-items:center;gap:10px;padding:8px;border-radius:14px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.12),inset 0 -0.5px 0 0 rgba(0,0,0,0.10),0 2px 6px rgba(0,0,0,0.18);
  margin-top:4px;min-width:180px;
}
.bubble .file-chip svg,.bubble .loc-chip svg,.bubble .music-chip svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;flex:0 0 auto;}
.bubble .file-chip .fn{flex:1;min-width:0;}
.bubble .file-chip .fn .t{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bubble .file-chip .fn .s{font-size:12px;opacity:.7;}
.voice-play{display:flex;align-items:center;gap:10px;min-width:160px;}
.voice-play .wave{width:34px;height:28px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.loc-map{width:100%;height:140px;border-radius:14px;overflow:hidden;position:relative;border:1px solid var(--border-soft);background:#1a1a20;}
.loc-map svg{border-radius:14px;}
.loc-pin{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);}
.bubble .loc-chip{display:block;padding:0;background:transparent;min-width:200px;}
.loc-name{font-weight:700;margin-bottom:8px;font-size:14px;color:var(--text);display:block;}
.music-chip{color:#fff;cursor:pointer;}
.music-chip .play{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.music-chip .play svg{width:16px;height:16px;stroke:#fff;fill:#fff;stroke-width:0;}
.music-chip .mi{flex:1;min-width:0;}
.music-chip .mi .tt{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.music-chip .mi .au{font-size:11px;opacity:.7;}
.music-chip .open-app{flex:0 0 auto;font-size:11px;padding:4px 8px;border-radius:10px;background:rgba(255,255,255,.18);color:#fff;text-decoration:none;margin-left:4px;}

/* 引用 */
/* iMessage式引用气泡(淡蓝背景+蓝色左边框) */
.quote-box{display:flex;gap:6px;padding:5px 10px 5px 12px;border-radius:10px 10px 10px 4px;
  background:rgba(100,140,220,.15);margin-bottom:4px;font-size:13px;
  border-left:3px solid rgba(100,140,220,.65);
  max-width:100%;
}
.msg-row.me .quote-box{background:rgba(100,140,220,.22);border-left-color:rgba(120,170,255,.7);}
.quote-box .qtxt{opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.quote-box .qdel{cursor:pointer;opacity:.5;margin-left:auto;flex-shrink:0;padding-left:4px;}

/* 输入框上方的引用预览(iMessage 风格) */
#quote-preview{display:none;align-items:center;gap:8px;padding:8px 10px;margin:4px 6px 0;border-radius:12px;background:rgba(100,140,220,.12);border-left:3px solid rgba(120,170,255,.7);position:relative;}
#quote-preview.active{display:flex;}
#quote-preview .qp-bar{flex:0 0 auto;}
#quote-preview .qp-content{flex:1;min-width:0;}
#quote-preview .qp-name{font-size:12px;font-weight:700;color:rgba(160,200,255,.95);margin-bottom:1px;}
#quote-preview .qp-text{font-size:13px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#quote-preview .qp-close{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--text-dim);flex:0 0 auto;
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 3px 10px var(--glass-btn-shadow);
  transition:transform .15s,box-shadow .15s;
}
#quote-preview .qp-close:hover{transform:translateY(-1px);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 5px 14px rgba(0,0,0,0.40);}
#quote-preview .qp-close:active,#quote-preview .qp-close.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.08),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 2px 6px rgba(0,0,0,0.25);}

/* 内心戏 */
.inner-box{margin-top:5px;border:1px dashed rgba(255,255,255,.3);border-radius:12px;padding:6px 9px;font-size:13px;font-style:italic;opacity:.9;background:rgba(255,255,255,.05);white-space:pre-wrap;}
.inner-box .ih{font-size:10px;opacity:.55;font-style:normal;letter-spacing:1px;}

/* 时间戳 → 微信式居中气泡 */
.ts-wrap{display:flex;justify-content:center;margin:8px 0;}
.ts-bubble{
  font-size:11px;color:var(--text-dim);padding:3px 10px;border-radius:10px;
  background:var(--glass-strong);border:1px solid var(--border-soft);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.ts-line{display:none;} /* 旧样式隐藏 */

/* ============ tapback → iMessage式气泡角标 ============ */
/* 整体隐藏旧的 tapbacks 定位,由 .msg-row 的 flex + order 控制新位置 */
.tapbacks{display:none;}
/* iMessage 风格反应小圆角气泡,叠加在气泡右下/左下角 */
.tapback-ios{
  position:absolute;bottom:-14px;z-index:5;
  display:flex;gap:3px;align-items:flex-end;
  pointer-events:none;
}
.msg-row.me .tapback-ios{left:-8px;right:auto;}
.msg-row:not(.me) .tapback-ios{right:-8px;left:auto;flex-direction:row-reverse;}
.tapback-ios .tb{
  pointer-events:all;cursor:pointer;
  min-width:22px;height:22px;padding:0 5px;
  border-radius:11px;
  background:var(--glass-strong);border:1px solid var(--border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;line-height:1;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  transition:transform .1s;
}
.tapback-ios .tb:active{transform:scale(1.2);}
.tapback-ios .tb.sel{background:color-mix(in oklch, var(--accent) 40%, transparent);border-color:var(--accent);}



/* ============ 输入区 ============ */
#composer{
  flex:0 0 auto;background:rgba(13,13,18,.7);
  backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  border-top:1px solid var(--border);
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  position:relative;z-index:60;  /* 创建独立堆叠上下文,让内部 +/贴纸/画板 面板浮在消息之上 */
}
.role-strip{display:flex;gap:8px;padding:4px 4px 8px;overflow-x:auto;align-items:center;}
.role-strip .avatar{border:2px solid transparent;transition:transform .18s,box-shadow .18s,border-color .15s;}
.role-strip .avatar.cur{border-color:var(--accent);box-shadow:0 0 0 2px rgba(139,124,245,0.4),0 1px 0 var(--glass-btn-shine) inset,0 8px 28px var(--glass-btn-shadow);transform:scale(1.06);}
.role-strip .nm{font-size:10px;color:var(--text-dim);text-align:center;margin-top:2px;white-space:nowrap;}
.role-strip .rp{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;}
.input-line{display:flex;align-items:flex-end;gap:7px;}
.plus-btn,.sticker-btn,.send-btn,.voice-btn{
  width:40px;height:40px;flex:0 0 auto;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 4px 12px var(--glass-btn-shadow);
  transition:background .15s,box-shadow .15s,transform .15s;
}
.plus-btn:hover,.sticker-btn:hover,.voice-btn:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 6px 18px rgba(0,0,0,0.45);}
.plus-btn:active,.sticker-btn:active,.voice-btn:active,.plus-btn.pressing,.sticker-btn.pressing,.voice-btn.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.08),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 2px 6px rgba(0,0,0,0.25);transform:scale(0.93);}
.send-btn{background:linear-gradient(135deg,var(--me-1),var(--me-2));border:none;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.25),inset 0 -0.5px 0 0 rgba(0,0,0,0.15),0 4px 12px rgba(0,0,0,0.35);transition:box-shadow .15s,transform .15s;}
.send-btn:hover{transform:translateY(-1px);box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.25),inset 0 -0.5px 0 0 rgba(0,0,0,0.15),0 6px 18px rgba(0,0,0,0.45);}
.send-btn:active,.send-btn.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.15),inset 0 -0.5px 0 0 rgba(0,0,0,0.15),0 2px 6px rgba(0,0,0,0.25);transform:scale(0.93);}
.plus-btn svg,.sticker-btn svg,.send-btn svg,.voice-btn svg{width:22px;height:22px;stroke:var(--text);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
.send-btn svg{stroke:#fff;fill:#fff;stroke-width:0;}
.voice-btn.rec{background:var(--danger);}
.voice-btn.rec svg{stroke:#fff;}
#msg-input{
  flex:1;min-height:40px;max-height:120px;resize:none;border-radius:18px;border:1px solid var(--border);
  background:var(--bg-glass);padding:9px 14px;font-size:15.5px;line-height:1.35;outline:none;overflow-y:auto;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.inline-edit{display:none;flex-direction:column;gap:6px;padding:8px;background:var(--glass-strong);border-radius:14px;margin-bottom:6px;}
.inline-edit.active{display:flex;}
.inline-edit textarea{flex:1;min-height:120px;max-height:50vh;border-radius:10px;background:var(--bg-1);border:1px solid var(--border-soft);padding:8px;font-size:14px;color:var(--text);outline:none;resize:none;overflow-y:auto;}
.inline-edit .acts{display:flex;gap:8px;justify-content:flex-end;}
.mini-btn{
  padding:8px 16px;border-radius:12px;
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 4px 12px var(--glass-btn-shadow);
  font-size:13px;font-weight:600;transition:background .15s,box-shadow .15s,transform .15s;
}
.mini-btn:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 6px 18px rgba(0,0,0,0.45);}
.mini-btn:active,.mini-btn.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.08),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 2px 6px rgba(0,0,0,0.25);}

/* + 面板 */
#plus-panel{display:none;position:absolute;left:12px;right:12px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px);z-index:65;
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:0 1px 0 var(--glass-btn-shine) inset,0 12px 40px var(--glass-btn-shadow),0 20px 60px rgba(0,0,0,0.55);
  padding:18px 14px;border-radius:24px;flex-wrap:wrap;gap:12px 8px;justify-content:space-around;
}
#plus-panel.active{display:flex;}
.pp-item{display:flex;flex-direction:column;align-items:center;gap:5px;width:23%;font-size:11px;color:var(--text-dim);}
.pp-item .ic{width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 4px 12px var(--glass-btn-shadow);
  transition:transform .15s,box-shadow .15s;
}
.pp-item .ic:hover{transform:translateY(-2px) scale(1.04);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 6px 18px rgba(0,0,0,0.45);}
.pp-item .ic:active,.pp-item.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.08),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 2px 6px rgba(0,0,0,0.25);}
.pp-item .ic svg{width:24px;height:24px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* 贴纸键盘 */
#sticker-panel{display:none;position:absolute;left:12px;right:12px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px);z-index:65;
  max-height:200px;overflow-y:auto;
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:0 1px 0 var(--glass-btn-shine) inset,0 12px 40px var(--glass-btn-shadow),0 20px 60px rgba(0,0,0,0.55);
  padding:14px;border-radius:24px;grid-template-columns:repeat(4,1fr);gap:10px;
}
#sticker-panel.active{display:grid;}
.sticker-cell{aspect-ratio:1;border-radius:16px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 4px 12px var(--glass-btn-shadow);
  transition:transform .15s,box-shadow .15s;
}
.sticker-cell:hover{transform:translateY(-2px) scale(1.03);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 6px 18px rgba(0,0,0,0.45);}
.sticker-cell:active,.sticker-cell.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.08),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 2px 6px rgba(0,0,0,0.25);}
.sticker-cell img{width:80%;height:80%;object-fit:contain;}
.sticker-cell .sticker-del{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;z-index:2;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);font-weight:700;}
.sticker-cell:hover .sticker-cell .sticker-del,.sticker-cell:active .sticker-del{opacity:1;}
/* 触屏:长按才显示删除按钮(默认不显示,避免误点) */
@media (hover:none){.sticker-cell.del-mode .sticker-del{opacity:1;background:rgba(255,80,80,.85);} .sticker-cell.del-mode{border:1.5px dashed var(--danger);}}

/* 画板 */
#draw-panel{
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 4px 12px var(--glass-btn-shadow);
  border-radius:24px;
}
#draw-panel{display:none;position:absolute;left:12px;right:12px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px);z-index:65;flex-direction:column;
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 4px 12px var(--glass-btn-shadow);
  border-radius:24px;padding:14px;
}
#draw-panel.active{display:flex;}
.draw-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px 8px;font-size:14px;color:var(--text-dim);}
.draw-header .icon-btn{width:28px;height:28px;border-radius:8px;background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);font-size:16px;color:var(--text);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 3px 10px var(--glass-btn-shadow);
  transition:transform .15s,box-shadow .15s;
}
.draw-header .icon-btn:hover{transform:translateY(-1px);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 5px 14px rgba(0,0,0,0.40);}
.draw-header .icon-btn:active,.draw-header .icon-btn.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.08),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 2px 6px rgba(0,0,0,0.25);}
#draw-canvas{width:100%;height:320px;background:#0a0c12;border-radius:16px;border:1px solid var(--glass-btn-bd);touch-action:none;}
.draw-resize{height:18px;display:flex;align-items:center;justify-content:center;cursor:ns-resize;margin-top:4px;touch-action:none;-webkit-user-select:none;user-select:none;}
.draw-resize span{width:44px;height:4px;border-radius:2px;background:rgba(255,255,255,0.22);transition:background .15s, width .15s;}
.draw-resize:hover span{background:rgba(255,255,255,0.42);width:56px;}
.draw-tools{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap;}
.draw-tools .pen{width:32px;height:32px;border-radius:50%;cursor:pointer;
  background:var(--glass-btn-bg);border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 3px 10px var(--glass-btn-shadow);
  transition:transform .15s,box-shadow .15s;
}
.draw-tools .pen:hover{transform:scale(1.08);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 5px 14px rgba(0,0,0,0.40);}
.draw-tools .pen:active,.draw-tools .pen.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.08),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 2px 6px rgba(0,0,0,0.25);}
.draw-tools .pen.sel{border-color:#fff;box-shadow:0 0 0 2px var(--accent),inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 3px 10px var(--glass-btn-shadow);}

/* ============ 弹出菜单 / 浮层 — 苹果毛玻璃统一样式 ============ */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.15);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.overlay.active{display:flex;}

/* === 统一毛玻璃浮动面板（所有悬浮窗的基底）=== */
.glass-panel{
  position:fixed;z-index:60;
  /* 暗色毛玻璃(玻璃黑) */
  background:var(--glass-btn-bg);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  border:1px solid var(--glass-btn-bd);
  border-radius:16px;
  /* 基础阴影抽成变量,各方向追加'连体阴影'让面板阴影延伸向按钮 */
  --gp-shadow:
    inset 0 0.5px 0 0 var(--glass-btn-shine),
    inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),
    0 4px 12px var(--glass-btn-shadow);
  box-shadow:var(--gp-shadow);
  /* 弹窗本身完整显示在屏幕内，内容区域独立滚动 */
  display:flex;flex-direction:column;
  max-height:calc(100dvh - 24px);
  overflow:hidden;
}
/* 连体阴影：面板阴影向按钮方向延伸，让两者像同一块悬浮物 */
.glass-panel.arrow-bottom{box-shadow:var(--gp-shadow),0 -3px 10px rgba(0,0,0,.18);}
.glass-panel.arrow-top{   box-shadow:var(--gp-shadow),0  3px 10px rgba(0,0,0,.18);}
.glass-panel.arrow-left{  box-shadow:var(--gp-shadow), 3px 0 10px rgba(0,0,0,.18);}
.glass-panel.arrow-right{ box-shadow:var(--gp-shadow),-3px 0 10px rgba(0,0,0,.18);}
/* 内部滚动容器：让弹窗内容可滚动，但弹窗本身不超出屏幕 */
.gp-scroll{
  overflow-x:hidden;overflow-y:auto;flex:1;min-height:0;
  display:flex;flex-direction:column;
  -webkit-overflow-scrolling:touch;
}
.glass-panel::before{
  content:'';
  position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.45),transparent);
  border-radius:0 0 50% 50%;
  z-index:2;pointer-events:none;
}
/* === 三角箭头：用户反馈太丑，全部移除（保留 .arrow-* 类名供动画 transform-origin 使用） === */
.glass-panel::after{
  content:'';position:absolute;
  /* 视觉完全隐藏 */
  display:none;
}
/* 四个方向的箭头规则全部删除，原来 opacity:1 的设置不再生效 */

/* === 弹簧浮现动画 === */
/* 从按钮方向'吐'出来：起点对准按钮，终点是面板最终位置 */
@keyframes glass-pop{
  from{transform:scale(0.82) translateY(0);opacity:0;}
  to{  transform:scale(1) translateY(0);opacity:1;}
}
@keyframes glass-pop-down{  /* 面板在按钮下方：从按钮向下展开 */
  from{transform:scale(0.82) translateY(-4px);opacity:0;}
  to{  transform:scale(1) translateY(0);opacity:1;}
}
@keyframes glass-pop-up{    /* 面板在按钮上方：从按钮向上展开 */
  from{transform:scale(0.82) translateY(4px);opacity:0;}
  to{  transform:scale(1) translateY(0);opacity:1;}
}
@keyframes glass-pop-left{  /* 面板在按钮左侧：从按钮向右展开 */
  from{transform:scale(0.82) translateX(4px);opacity:0;}
  to{  transform:scale(1) translateX(0);opacity:1;}
}
@keyframes glass-pop-right{ /* 面板在按钮右侧：从按钮向左展开 */
  from{transform:scale(0.82) translateX(-4px);opacity:0;}
  to{  transform:scale(1) translateX(0);opacity:1;}
}
@keyframes glass-pop-x{
  from{transform:scale(0.75) translateX(8px);opacity:0;}
  to{  transform:scale(1) translateX(0);opacity:1;}
}
@keyframes glass-close{
  from{transform:scale(1);opacity:1;}
  to{  transform:scale(0.75) translateY(8px);opacity:0;}
}
/* 列表项 stagger */
@keyframes glass-item{
  from{transform:translateY(6px);opacity:0;}
  to{  transform:translateY(0);opacity:1;}
}
.glass-panel{display:none;}
.glass-panel.show{
  display:flex;flex-direction:column;
  animation:glass-pop .28s cubic-bezier(0.34,1.56,0.64,1) both;
  transform-origin:top center;
}
/* 方向专属动画 + transform-origin：起点对准按钮那一侧 */
.glass-panel.arrow-bottom.show{animation:glass-pop-down .28s cubic-bezier(0.34,1.56,0.64,1) both;transform-origin:top center;}
.glass-panel.arrow-top.show{   animation:glass-pop-up   .28s cubic-bezier(0.34,1.56,0.64,1) both;transform-origin:bottom center;}
.glass-panel.arrow-left.show{  animation:glass-pop-left .28s cubic-bezier(0.34,1.56,0.64,1) both;transform-origin:right center;}
.glass-panel.arrow-right.show{ animation:glass-pop-right .28s cubic-bezier(0.34,1.56,0.64,1) both;transform-origin:left center;}
.glass-panel.show-x{
  display:flex;flex-direction:column;
  animation:glass-pop-x .28s cubic-bezier(0.34,1.56,0.64,1) both;
  transform-origin:left center;
}
.glass-panel.hiding{
  display:flex;flex-direction:column;
  animation:glass-close .18s ease-in both;
}

/* === 通用弹窗背景遮罩（除修改壁纸外所有弹窗）=== */
#popup-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.18);
  z-index:55;display:none;opacity:0;
  transition:opacity .2s ease;
  pointer-events:none; /* 默认不拦截点击，弹窗自己的 outside 逻辑处理 */
}
#popup-backdrop.active{display:block;opacity:1;pointer-events:auto;cursor:default;}

/* sheet 底部面板 */
.sheet{

  padding:10px 10px calc(14px + env(safe-area-inset-bottom));

}
.sheet-h{padding:8px 8px 12px;text-align:center;font-size:15px;color:var(--text-dim);font-weight:500;}
.sheet-btn{
  display:flex;align-items:center;gap:11px;
  width:100%;padding:12px 14px;border-radius:14px;font-size:15.5px;font-weight:500;
  background:var(--glass-btn-bg);margin-bottom:5px;
  color:var(--text);font-family:inherit;cursor:pointer;justify-content:flex-start;
  border:1px solid var(--glass-btn-bd);
  backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--glass-btn-blur)) saturate(180%);
  box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 4px 12px var(--glass-btn-shadow);
  transition:background .15s,box-shadow .15s,transform .15s;
}
.sheet-btn:hover{background:rgba(255,255,255,0.14);box-shadow:inset 0 0.5px 0 0 var(--glass-btn-shine),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 6px 18px rgba(0,0,0,0.45);transform:translateY(-1px);}
.sheet-btn:active,.sheet-btn.pressing{animation:jelly-press .22s ease forwards;box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.08),inset 0 -0.5px 0 0 var(--glass-btn-inset-dark),0 2px 6px rgba(0,0,0,0.25);}
.sheet-btn.primary{justify-content:center;background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.18);box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.20),inset 0 -0.5px 0 0 rgba(0,0,0,0.15),0 4px 12px rgba(0,0,0,0.30);font-weight:600;color:var(--text);}
.sheet-btn.primary:hover{background:rgba(255,255,255,0.18);box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,0.25),inset 0 -0.5px 0 0 rgba(0,0,0,0.15),0 6px 18px rgba(0,0,0,0.40);}
/* stagger 动画 */
.sheet-btn:nth-child(1){animation:glass-item .22s ease both .02s}
.sheet-btn:nth-child(2){animation:glass-item .22s ease both .05s}
.sheet-btn:nth-child(3){animation:glass-item .22s ease both .08s}
.sheet-btn:nth-child(4){animation:glass-item .22s ease both .11s}
.sheet-btn:nth-child(5){animation:glass-item .22s ease both .14s}
.sheet-btn:nth-child(6){animation:glass-item .22s ease both .17s}
.sheet-btn:nth-child(n+7){animation:glass-item .22s ease both .20s}

<script>
"use strict";
/* ===================== IndexedDB 封装 ===================== */
const DB_NAME='rpchat_db', DB_VER=1;
let db=null;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{const d=e.target.result;
    ['meta','contacts','chats','messages','stickers','music'].forEach(s=>{
      if(!d.objectStoreNames.contains(s)) d.createObjectStore(s,{keyPath:'id'});
    });
  };
  r.onsuccess=e=>{db=e.target.result;res(db);};
  r.onerror=e=>rej(e.target.error);
});}
function store(s,mode){return db.transaction(s,mode).objectStore(s);}
function p(requ){return new Promise((res,rej)=>{requ.onsuccess=()=>res(requ.result);requ.onerror=()=>rej(requ.error);});}
function put(s,v){return p(store(s,'readwrite').put(v));}
function del(s,k){return p(store(s,'readwrite').delete(k));}
function get(s,k){return p(store(s,'readonly').get(k));}
function getAll(s){return p(store(s,'readonly').getAll()).then(r=>r||[]);}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const clone=o=>JSON.parse(JSON.stringify(o));

/* ===================== 全局状态 ===================== */
const State={
  me:{id:'me',name:'我',avatar:null},
  contacts:[], chats:[], messages:{}, stickers:[], music:[],
  view:'chats', chatId:null,
  role:null,                 // 当前发送身份 id
  selMode:false, selIds:new Set(),
  editTarget:null,          // {type:'message'|'inner'|'ts'|'quote', msgId}
  quoteId:null,
  searchActive:false,
};
/* 深色莫兰迪色系（聊天气泡用） */
const COLORS=[
  'rgba(70,80,140,.38)',   // 雾霾蓝
  'rgba(85,95,155,.38)',   // 浅雾蓝
  'rgba(55,65,115,.38)',   // 深雾蓝
  'rgba(95,72,88,.38)',    // 玫瑰灰
  'rgba(80,68,100,.38)',   // 烟灰紫
  'rgba(68,78,68,.38)',    // 橄榄灰绿
  'rgba(72,90,72,.38)',    // 松石绿
  'rgba(100,85,70,.38)',   // 暖灰褐
  'rgba(60,70,82,.38)',    // 深石墨
  'rgba(52,56,68,.38)',    // 蓝石墨
  'rgba(48,52,60,.38)',    // 深炭灰
  'rgba(90,70,85,.38)',    // 玫瑰棕
  'rgba(78,82,70,.38)',    // 苔藓绿
  'rgba(58,68,98,.38)',    // 午夜蓝
  'rgba(68,82,78,.38)',    // 灰青
  'rgba(60,65,75,.38)',    // 钢灰
];
const DEFAULT_MY_BUBBLE = 'rgba(45,45,65,.35)'; // "我"的默认气泡色
const TAPBACKS=['✅','❌','💩','🌹','👍','❤️','😂','☺️','🥵','🤡','👀','✨','😭','🤑','🏆'];

/* ===================== 工具 ===================== */
const $=s=>document.querySelector(s);
const $$=s=>Array.from(document.querySelectorAll(s));
function blobUrl(b){return b?URL.createObjectURL(b):null;}
function blobToDataURL(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(blob);});}
function avatarHtml(av,bytes,cls){ // av: blob or dataurl
  if(av){return `<img class="avatar ${cls||''}" src="${typeof av==='string'?av:blobUrl(av)}" alt="">`;}
  const ch=bytes?bytes.slice(0,1):'·';
  return `<div class="avatar ${cls||''}">${ch}</div>`;
}
async function blobToB64(b){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(b);});}
function b64ToBlob(b64){const [h,data]=b64.split(',');const m=h.match(/:(.*?);base64/);const mt=m?m[1]:'application/octet-stream';const bin=atob(data);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mt});}
function showToast(t){const el=$('#toast');el.textContent=t;el.classList.add('active');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('active'),1600);}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';return (b/1048576).toFixed(1)+' MB';}

/* ===================== 初始化 ===================== */
async function init(){
  try{
    await openDB();
    await loadAll();
    // 如果 IndexedDB 是空的,尝试从 localStorage 恢复(元数据)
    if(!State.contacts.length){
      const restored=await tryRestoreFromLocal();
      if(restored){
        await loadAll();
        showToast('已从本地恢复(图片/语音需重新下载)');
      }
    }
  }catch(e){
    console.warn('IndexedDB 不可用,切换到内存模式:',e);
    State._memoryMode=true;
    State.me={id:'me',name:'我',avatar:null};
    State.contacts=[];State.chats=[];State.stickers=[];State.music=[];State.messages={};
  }
  // 如果没有任何数据,自动填入演示数据
  if(!State.contacts.length){
    const c1={id:'user_1',name:'林小晴',avatar:null,color:'#a78bfa',order:0};
    const c2={id:'user_2',name:'顾晨曦',avatar:null,color:'#34d399',order:1};
    State.contacts.push(c1,c2);
    const msgs1=[
      {id:uid(),chatId:'chat_demo',senderId:'user_1',type:'text',text:'终于找到组织了!',ts:Date.now()-3600000,order:1},
      {id:uid(),chatId:'chat_demo',senderId:'me',type:'text',text:'欢迎欢迎~这里是语C多角色聊天',ts:Date.now()-3500000,order:2},
      {id:uid(),chatId:'chat_demo',senderId:'user_1',type:'text',text:'我刚学会一个超可爱的说话方式',ts:Date.now()-3000000,order:3},
      {id:uid(),chatId:'chat_demo',senderId:'user_2',type:'text',text:'什么什么?快说来听听!',ts:Date.now()-2900000,order:4},
      {id:uid(),chatId:'chat_demo',senderId:'user_1',type:'text',text:'就是...嘿嘿(*/ω\*)',ts:Date.now()-2800000,order:5},
    ];
    const msgs2=[
      {id:uid(),chatId:'chat_2',senderId:'user_2',type:'text',text:'你看了今天的剧本吗',ts:Date.now()-7200000,order:1},
      {id:uid(),chatId:'chat_2',senderId:'me',type:'text',text:'看了看了!剧情好绝',ts:Date.now()-7100000,order:2},
    ];
    State.chats=[
      {id:'chat_demo',type:'group',title:'语C聊天室',avatar:null,participants:['user_1','user_2'],order:0,unread:0},
      {id:'chat_2',type:'single',title:null,avatar:null,participants:['user_2'],order:1,unread:1},
    ];
    State.messages={'chat_demo':msgs1,'chat_2':msgs2};
    if(!State._memoryMode){
      try{
        for(const c of State.contacts) await put('contacts',c);
        for(const c of State.chats) await put('chats',c);
        for(const cid in State.messages) for(const m of State.messages[cid]) await put('messages',m);
        syncLocalBackup();
      }catch(_){}
    }
  }
  // 加载聊天背景和主题
  const bgMeta=await get('meta','chatBg');
  const themeMeta=await get('meta','chatTheme');
  if(bgMeta&&bgMeta.css){State.chatBg=bgMeta.css;applyBgToBody();}
  if(themeMeta&&themeMeta.theme){State.chatTheme=themeMeta.theme;applyThemeColors(themeMeta.theme);}
  bindGlobal();
  renderAll();
  renderStorageInfo();
  if(!State.role) State.role='me';
  // 启动时同步一次 localStorage
  syncLocalBackup();
}
async function loadAll(){
  const me=await get('meta','me');
  if(me){State.me={id:'me',name:me.name||'我',avatar:me.avatar||null,color:me.color||null};}
  State.contacts=await getAll('contacts');
  State.chats=await getAll('chats');
  State.stickers=await getAll('stickers');
  State.music=await getAll('music');
  const msgs=await getAll('messages');
  State.messages={};
  msgs.forEach(m=>{(State.messages[m.chatId]=State.messages[m.chatId]||[]).push(m);});
  for(const k in State.messages){
    State.messages[k].sort((a,b)=>(a.order??a.ts??0)-(b.order??b.ts??0));
    // 给没有order的老消息按顺序赋值，否则插入消息时order计算会变成NaN
    State.messages[k].forEach((m,i)=>{if(m.order==null){m.order=i+1;put('messages',m);}});
  }
}
async function persistAll(){ // 保存 me 资料
  await put('meta','me',State.me);
}
function saveMe(){return put('meta',{id:'me',name:State.me.name,avatar:State.me.avatar,color:State.me.color||null});}

/* ===================== 视图切换 ===================== */
function switchView(v){
  State.view=v;
  $$('.view').forEach(s=>s.classList.remove('active'));
  if(v==='chats')$('#view-chats').classList.add('active');
  else if(v==='contacts')$('#view-contacts').classList.add('active');
  else if(v==='me')$('#view-me').classList.add('active');
  $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===v));
  showNav(true);
  if(v==='me') renderMe();
  if(v==='contacts') renderContacts();
  if(v==='chats') renderChats();
}
function showNav(b){$('#bottomnav').classList.toggle('hidden',!b);}

/* ===================== 聊天列表渲染 ===================== */
function sortedChats(){return State.chats.slice().sort((a,b)=>(a.order||0)-(b.order||0));}
function lastMsgOf(cid){const arr=State.messages[cid];return arr&&arr.length?arr[arr.length-1]:null;}
function chatPreview(c){
  const m=lastMsgOf(c.id); if(!m) return {text:'暂无消息',ts:''};
  let t='';
  if(m.type==='text'||m.type==='sticker') t=m.text;
  else if(m.type==='image'||m.type==='drawing') t='[图片]';
  else if(m.type==='voice') t='[语音]';
  else if(m.type==='file') t='[文件] '+m.fileName;
  else if(m.type==='music') t='[音乐] '+m.title;
  else if(m.type==='location') t='[定位] '+m.placeName;
  else t='['+m.type+']';
  if(m.innerThought) t+=' 💭';
  const who = m.senderId==='me'?'':(contactName(m.senderId)+':');
  return {text:who+t,ts:''};
}
function contactName(id){if(id==='me')return State.me.name;const c=State.contacts.find(x=>x.id===id);return c?c.name:id;}
function chatTitle(c){ if(c.title) return c.title; if(c.type==='single'){const o=State.contacts.find(x=>x.id===c.participants[0]);return o?o.name:'聊天';} return '群聊';}
function chatAvatar(c){
  if(c.type==='single'){const o=State.contacts.find(x=>x.id===c.participants[0]);return o?o.avatar:null;}
  return c.avatar||null;
}
function renderChats(){
  const wrap=$('#chat-list'); wrap.innerHTML='';
  const list=sortedChats();
  if(!list.length){wrap.innerHTML='<div class="empty">还没有聊天<br>点右下角 + 创建群聊,或在联系人里开始对话</div>';return;}
  list.forEach(c=>{
    const prev=chatPreview(c);
    const av=chatAvatar(c);
    const el=document.createElement('div');
    el.className='chat-item'; el.dataset.id=c.id;
    el.innerHTML=`${avatarHtml(av,chatTitle(c))}
      <div class="meta"><div class="name">${esc(chatTitle(c))}</div><div class="prev">${esc(prev.text)}</div></div>

    {const mb=el.querySelector('.more-btn');
      // 关键：pointerdown 阶段就拦截，阻止 enableLongPress 的 timer 启动

/* ===================== 长按 + 拖拽 ===================== */
function enableLongPress(el,cb){
  let timer=null,startX=0,startY=0;
  el.addEventListener('pointerdown',e=>{
    if(e.target.closest('.select-box'))return;
    startX=e.clientX;startY=e.clientY;
    timer=setTimeout(()=>{if(State._dragMoved)return;timer=null;cb();},450);
  });
  const cancel=()=>{if(timer){clearTimeout(timer);timer=null;}};
  el.addEventListener('pointermove',e=>{if(timer&&(Math.abs(e.clientX-startX)>8||Math.abs(e.clientY-startY)>8))cancel();});
  el.addEventListener('pointerup',cancel);
  el.addEventListener('pointerleave',cancel);
  el.addEventListener('contextmenu',e=>{e.preventDefault();cb();});
}
function enableDragSort(el,storeName,id){
  // 桌面端：HTML5 拖拽
  el.draggable=true;
  el.addEventListener('dragstart',e=>{State._dragId=id;State._dragMoved=false;el.classList.add('drag-ghost');e.dataTransfer.effectAllowed='move';});
  el.addEventListener('dragend',()=>{el.classList.remove('drag-ghost');$$('.'+el.className.split(' ')[0]).forEach(x=>x.classList.remove('drag-over-up','drag-over-down'));setTimeout(()=>State._dragMoved=false,80);});
  el.addEventListener('dragover',e=>{e.preventDefault();if(State._dragId&&State._dragId!==id){const r=el.getBoundingClientRect();const after=(e.clientY-r.top)>r.height/2;el.classList.toggle('drag-over-down',!after);el.classList.toggle('drag-over-up',after);}});
  el.addEventListener('drop',e=>{e.preventDefault();const tid=State._dragId;if(!tid||tid===id)return;State._dragMoved=true;reorder(storeName,tid,id);
    $$('.'+el.className.split(' ')[0]).forEach(x=>x.classList.remove('drag-over-up','drag-over-down'));});
}
function enableTouchDragSort(el,storeName,id){
  // 移动端：触摸拖拽（长按 350ms 后启动，避免与点击/长按菜单冲突）
  let timer=null,startY=0,startX=0,dragging=false,ghost=null;
  const cls=el.className.split(' ')[0];
  const clearTimer=()=>{if(timer){clearTimeout(timer);timer=null;}el.classList.remove('press-to-drag');};
  const makeGhost=()=>{const g=el.cloneNode(true);g.style.position='fixed';g.style.zIndex='9999';g.style.opacity='0.9';g.style.pointerEvents='none';g.style.width=el.offsetWidth+'px';g.classList.add('drag-ghost');return g;};
  const updateGhost=(y)=>{if(ghost)ghost.style.top=(y-ghost.offsetHeight/2)+'px';};
  const findTarget=(y)=>{const items=[...el.parentElement.querySelectorAll('.'+cls)].filter(x=>x!==el&&x!==ghost);for(const it of items){const r=it.getBoundingClientRect();if(y>=r.top&&y<=r.bottom)return it;}return null;};
  const clearOver=()=>{el.parentElement.querySelectorAll('.'+cls).forEach(x=>x.classList.remove('drag-over-up','drag-over-down'));State._touchDragTarget=null;};
  const setOver=(target,y)=>{clearOver();if(!target)return;const r=target.getBoundingClientRect();const after=(y-r.top)>r.height/2;target.classList.toggle('drag-over-down',!after);target.classList.toggle('drag-over-up',after);State._touchDragTarget=target;};
  el.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;const t=e.touches[0];startX=t.clientX;startY=t.clientY;dragging=false;el.classList.add('press-to-drag');timer=setTimeout(()=>{timer=null;dragging=true;State._dragId=id;State._dragMoved=true;ghost=makeGhost();ghost.style.left=el.getBoundingClientRect().left+'px';updateGhost(startY);document.body.appendChild(ghost);el.classList.add('drag-ghost');},300);},{passive:true});
  el.addEventListener('touchmove',e=>{if(!dragging){if(timer){const t=e.touches[0];if(Math.abs(t.clientX-startX)>10||Math.abs(t.clientY-startY)>10)clearTimer();}return;}e.preventDefault();const t=e.touches[0];updateGhost(t.clientY);const target=findTarget(t.clientY);setOver(target,t.clientY);},{passive:false});
  el.addEventListener('touchend',e=>{clearTimer();el.classList.remove('press-to-drag');if(!dragging)return;dragging=false;if(ghost){ghost.remove();ghost=null;}el.classList.remove('drag-ghost');const target=State._touchDragTarget;if(target){const tid=target.dataset.id;if(tid&&tid!==id){State._dragMoved=true;reorder(storeName,id,tid);}}clearOver();State._dragId=null;setTimeout(()=>State._dragMoved=false,80);});
  el.addEventListener('touchcancel',()=>{clearTimer();if(ghost){ghost.remove();ghost=null;}dragging=false;el.classList.remove('drag-ghost','press-to-drag');clearOver();State._dragId=null;});
}
function reorder(storeName,dragId,targetId){
  let arr = storeName==='chats'?State.chats:State.contacts;
  const sorted=arr.slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const from=sorted.findIndex(x=>x.id===dragId);
  const to=sorted.findIndex(x=>x.id===targetId);
  if(from<0||to<0||from===to)return;
  const [item]=sorted.splice(from,1);
  let insertAt = from<to ? to : to+1;
  sorted.splice(insertAt,0,item);
  sorted.forEach((x,i)=>{x.order=i;put(storeName,x);});
  if(storeName==='chats')renderChats();else renderContacts();
}

/* ===================== 打开对话 ===================== */
async function openChat(cid){
  const c=State.chats.find(x=>x.id===cid); if(!c)return;
  State.chatId=cid; State.selMode=false; State.selIds.clear(); State.quoteId=null;
  clearQuotePreview();
  State.role='me';
  $$('.view').forEach(s=>s.classList.remove('active'));
  const chatView=$('#view-chat');
  if(chatView) chatView.classList.add('active');
  showNav(false);
  $('#convo-title').textContent=chatTitle(c);
  renderRoleStrip(c);
  renderMessages();
  // 等 DOM 完全渲染后再滚动到底部
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const s=$('#convo-scroll');
    if(s) s.scrollTop=s.scrollHeight;
  }));
}
function startChatWith(contactId){
  // 单人聊天(若已存在则打开,否则创建)
  let c=State.chats.find(x=>x.type==='single'&&x.participants.length===1&&x.participants[0]===contactId);
  if(!c){c={id:uid(),type:'single',title:null,avatar:null,participants:[contactId],order:State.chats.length,unread:0};State.chats.push(c);put('chats',c);}
  openChat(c.id);
}

/* ===================== 消息渲染 ===================== */
function fmtTime(ts){
  if(!ts)return '';
  const d=new Date(ts);
  const y=d.getFullYear(),mo=('0'+(d.getMonth()+1)).slice(-2),day=('0'+d.getDate()).slice(-2);
  const h=('0'+d.getHours()).slice(-2),mi=('0'+d.getMinutes()).slice(-2);
  return `${y}/${mo}/${day} ${h}:${mi}`;
}
function renderMessages(){
  const scroll=$('#convo-scroll'); const cid=State.chatId; if(!cid)return;
  const arr=(State.messages[cid]||[]).slice().sort((a,b)=>(a.order??a.ts??0)-(b.order??b.ts??0));
  const c=State.chats.find(x=>x.id===cid);
  scroll.innerHTML='';
  if(!arr.length){scroll.innerHTML='<div class="empty">开始你们的对话吧</div>';return;}
  // 分组：连续同 sender 的消息归为一组（垂直堆叠，组内头像占位始终保留）
  const groups=[];
  let curGroup=null;
  arr.forEach((m)=>{
    const isSame=curGroup && curGroup.sender===m.senderId && !m.timestampText;
    if(isSame){curGroup.items.push(m);}
    else{curGroup={sender:m.senderId,items:[m]};groups.push(curGroup);}
  });
  groups.forEach(g=>{
    const isMe=g.sender==='me';
    // 组首时间戳（插在组之前）
    if(g.items[0].timestampText){
      const tsWrap=document.createElement('div');tsWrap.className='ts-wrap';
      tsWrap.innerHTML=`<div class="ts-bubble">${esc(g.items[0].timestampText)}</div>`;
      scroll.appendChild(tsWrap);
    }
    const group=document.createElement('div');
    group.className='msg-group'+(isMe?' me':'');
    g.items.forEach((m,j)=>{
      const sender=isMe?State.me:(State.contacts.find(x=>x.id===m.senderId)||{name:m.senderId});
      const showAv=(j===0) && !isMe;  // 组首且非"我"才显示头像
      const selBox=State.selMode?`<div class="select-box"><svg viewBox="0 0 24 24"><path d="M5 12l5 5 9-11"/></svg></div>`:'';
      // 非"我"始终有头像占位（34px），只是内容可能为空
      const avHtml=isMe?'':`<div class="av-slot">${showAv?avatarHtml(sender.avatar,sender.name,'sm'):''}</div>`;
      const row=document.createElement('div');
      row.className='msg-row'+(isMe?' me':'')+(State.selMode?' sel-mode':'')+(State.selIds.has(m.id)?' selected':'');
      row.dataset.id=m.id;
      row.innerHTML=selBox+avHtml+bubbleInner(m,c,sender,isMe);
      if(State.selMode){row.onclick=()=>toggleSelect(m.id);}
      else{ const msgRef=m; enableLongPress(row,()=>msgMenu(msgRef)); }
      group.appendChild(row);
    });
    scroll.appendChild(group);
  });
  const sf=$('#sel-fab'); if(sf){sf.classList.toggle('hidden', !(State.selMode&&State.selIds.size>0)); sf.textContent='操作所选 ('+State.selIds.size+')';}
  // 贴纸点击修改
  scroll.querySelectorAll('.tapback-ios').forEach(el=>{
    el.querySelectorAll('.tb').forEach((tb,idx)=>{
      tb.onclick=(e)=>{e.stopPropagation();const mid=el.dataset.tb;const m=findMsg(mid);if(m)openTapback(m,idx);};
    });
  });
}

function bubbleInner(m,c,sender,isMe){
  let html=`<div class="bubble-wrap">`;
  // 引用
  if(m.quoteId){const q=findMsg(m.quoteId); if(q){html+=`<div class="quote-box"><div class="qtxt">${esc(contactName(q.senderId))}:${esc(quoteText(q))}</div><div class="qdel" data-qdel="${m.id}">×</div></div>`;}}
  // 气泡颜色:优先使用消息自定义颜色,否则对方用联系人主题色,"我"用个人资料设置的颜色
  let bubbleColor=m.color;
  if(!bubbleColor){
    if(isMe){
      bubbleColor=State.me.color||DEFAULT_MY_BUBBLE;
    }else if(sender&&sender.color){
      // 对方使用联系人主题色,保持35%不透明度
      const baseColor=sender.color.replace(/,\s*[\d.]+\)/,',.35)');
      bubbleColor=baseColor;
    }
  }
  let style=bubbleColor?`style="--bubble-bg:${bubbleColor};--bubble-border:${bubbleColor}"`:'';
  html+=`<div class="bubble" ${style}>`;
  html+=contentHtml(m);
  html+=`</div>`;
  // 内心戏
  if(m.innerThought){html+=`<div class="inner-box">${esc(m.innerThought)}</div>`;}
  // iMessage式贴纸反应(叠加在气泡角上)
  if(m.tapbacks&&m.tapbacks.length){
    html+=`<div class="tapback-ios" data-tb="${m.id}">`+m.tapbacks.map((t,i)=>`<div class="tb" data-idx="${i}">${t}</div>`).join('')+`</div>`;
  }
  html+=`</div>`;
  return html;
}

function locMapImg(m){

  // 生成密集道路网 - 布满整个区域

  const url=m.url||(songId?`https://music.163.com/song?id=${songId}`:'');
  const deep=`orpheuswidget://song?id=${songId||''}`;
  const sheet=$('#sheet');
  /* 关键:iOS Safari 只有 "真实 <a> 标签被用户点" 才会跳到外部 APP。
     所以 "打开 APP" 本身必须是 <a href="orpheuswidget://..."> 标签,不能是 <button>。
     "在浏览器中打开" 也用 <a target="_blank"> 以避开 iOS 弹窗拦截。 */
  sheet.innerHTML=`<div class="sheet-h">${esc(m.title||'音乐')}</div>
    ${songId?`<a class="sheet-btn sheet-link" href="${deep}" data-a="app">▸ 在网易云 APP 中打开</a>`:''}

    e.preventDefault();closeSheet();

      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>showToast('已复制链接')).catch(()=>prompt('复制:',url));}

/* 统一浮动面板定位：锚定按钮，智能翻转
   使用 visualViewport 避开软键盘区，12px 安全边距 */
function getViewport(){
  const vv=window.visualViewport;
  if(vv){return {w:document.documentElement.clientWidth,h:vv.height,top:vv.offsetTop};}
  return{w:document.documentElement.clientWidth,h:window.innerHeight,top:0};
}
function calcPanelPos(anchorRect,pw,ph,gap){
  const SAFE=16;
  const vp=getViewport();
  const vw=vp.w, vh=vp.h, vTop=vp.top;
  // 默认在按钮下方、水平居中
  let top=anchorRect.bottom+gap;
  let left=anchorRect.left+anchorRect.width/2-pw/2;
  let dir='down';
  // 下方超出 → 翻转向上
  if(top+ph>vh+vTop-SAFE){
    top=anchorRect.top-ph-gap;
    dir='up';
  }
  // 上方也不足 → 选空间大的一侧，夹紧到安全区
  if(top<vTop+SAFE){
    const spaceBelow=(vh+vTop)-anchorRect.bottom-gap;
    if(spaceBelow>=ph+2*SAFE){top=anchorRect.bottom+gap;dir='down';}
    else{top=vTop+SAFE;}
  }
  // 水平夹紧到视口(按钮偏左/偏右时不会拉出屏)
  left=Math.max(SAFE,Math.min(vw-pw-SAFE,left));
  top=Math.max(vTop+SAFE,Math.min(vh+vTop-ph-SAFE,top));
  return{top,left,dir};
}

/* 面板实际渲染后，用真实尺寸二次夹紧(不受 scale 变形影响,16px 安全边距)
   关键：用 style.top + offsetHeight 算边界，不用 getBoundingClientRect——
   后者会受 transform:scale 动画影响返回缩放后的视觉尺寸 */
function clampPanelToViewport(el){
  const SAFE=16;
  const vp=getViewport();
  const vw=vp.w,vh=vp.h,vTop=vp.top;
  const pw=el.offsetWidth, ph=el.offsetHeight;
  if(!pw||!ph)return;
  let top=parseFloat(el.style.top)||0;
  let left=parseFloat(el.style.left)||0;
  if(top+ph>vh+vTop-SAFE)el.style.top=(vh+vTop-ph-SAFE)+'px';
  else if(top<vTop+SAFE)el.style.top=(vTop+SAFE)+'px';
  if(left+pw>vw-SAFE)el.style.left=(vw-pw-SAFE)+'px';
  else if(left<SAFE)el.style.left=SAFE+'px';
}

/* 显示玻璃面板（带动画） */
function glassShow(el){
  el.classList.remove('hiding');
  // 关键：清除 glassHide 留下的内联 style.display='none'，否则会压过 CSS 的 .show{display:flex}
  el.style.display='';
  void el.offsetWidth; // reflow 触发重绘
  el.classList.add('show');
}
/* 隐藏玻璃面板（先动画后消失） */
function glassHide(el){
  if(!el)return;
  if(!el.classList.contains('show') && !el.classList.contains('hiding')){
    hideBackdrop();
    return;
  }
  el.classList.remove('show');
  el.classList.add('hiding');
  let done=false;
  const finish=()=>{
    if(done)return;
    done=true;
    el.classList.remove('hiding');
    el.style.display='none';
    el.removeEventListener('animationend',onEnd);
    hideBackdrop();
  };
  // 只认 glass-close 动画的结束事件——不要被中途被中断的 show 动画的 animationend 误触发
  const onEnd=e=>{if(e.animationName==='glass-close')finish();};
  el.addEventListener('animationend',onEnd);
  // 兜底：220ms 后强制隐藏（动画时长 .18s，保留一点余量；防止 animationend 不触发）
  setTimeout(finish,220);
}

  document.querySelectorAll('.glass-panel.show').forEach(p=>glassHide(p));

},{capture:true});
async function handleMsgAction(a,m){
  if(a==='quote'){State.quoteId=m.id;showQuotePreview(m);return;}
  if(a==='edit'){openInline('message',m.id);return;}
  if(a==='del'){deleteMsg(m.id);return;}
  if(a==='copy'){const t=plainText(m);navigator.clipboard&&navigator.clipboard.writeText(t);showToast('已复制');return;}
  if(a==='inner'){ if(m.innerThought){openInline('inner',m.id);} else {openInline('inner',m.id);} return;}
  if(a==='ts'){ if(m.timestampText){editTs(m);} else {m.timestampText=fmtTime(m.ts)||fmtNow();await put('messages',m);keepScrollInPlace(()=>renderMessages());} return;}
  if(a==='insert'){openInsert(m.id);return;}
  if(a==='multi'){enterSelectMode();return;}
  if(a==='tap'){openTapback(m);return;}

async function insertMsg(afterId,data,before){
  const arr=State.messages[State.chatId]; const idx=arr.findIndex(x=>x.id===afterId);
  let order;
  if(before){ // 插入到所选消息上方
    if(idx<=0){ order=(arr.length?arr[0].order-1:1); } // 插到最前
    else{ order=(arr[idx-1].order+arr[idx].order)/2; } // 两消息之间
  }else{ // 插入到所选消息下方（原有逻辑）
    order = idx<0? (arr.length?arr[arr.length-1].order+1:1) : arr[idx].order+0.5;
  }
  if(!isFinite(order)) order=arr.length?arr[arr.length-1].order+1:1; // 兜底
  // sender 取长按的那条消息的发言者和时间，不是当前用户
  const refMsg=arr.find(x=>x.id===afterId);
  const senderId=refMsg?refMsg.senderId:State.role;
  const c=State.chats.find(x=>x.id===State.chatId);
  const msg={id:uid(),chatId:State.chatId,ts:(refMsg&&refMsg.ts)?refMsg.ts:Date.now(),senderId,order, ...data};
  arr.push(msg); arr.sort((a,b)=>(a.order??a.ts??0)-(b.order??b.ts??0));
  await put('messages',msg);
  syncLocalBackup();
  // 更新预览
  updateChatPreview();
  renderMessages();
}
function updateChatPreview(){const c=State.chats.find(x=>x.id===State.chatId);if(c){c.unread=c.unread||0;put('chats',c);}}

async function mergeSelected(){
  const arr=State.messages[State.chatId];
  const sel=arr.filter(m=>State.selIds.has(m.id)).sort((a,b)=>a.order-b.order);
  if(sel.length<2){showToast('至少选择2条');exitSelectMode();return;}
  // 拼接文本:去掉原始引用前缀,取纯文本拼接
  const combined=sel.map(m=>quoteText(m)).join('\n');
  const first=sel[0];
  // 新消息保留第一条的发送者、插入到第一条的位置
  const newMsg={id:uid(),chatId:State.chatId,senderId:first.senderId,order:first.order,type:'text',text:combined,ts:Date.now()};
  // 刪除原 N 条
  for(const m of sel){await del('messages',m.id);const i=arr.findIndex(x=>x.id===m.id);if(i>=0)arr.splice(i,1);}
  // 插入到原第一条位置(用 first.order,保证新消息在原位)
  arr.push(newMsg);
  arr.sort((a,b)=>(a.order??a.ts??0)-(b.order??b.ts??0)).forEach((m,i)=>m.order=i);
  await put('messages',newMsg);
  State.selIds.clear();State.selMode=false;renderMessages();
  showToast('已合并为一条');
}
async function chainSelected(){
  const arr=State.messages[State.chatId];
  arr.forEach(m=>{if(State.selIds.has(m.id)){m.chained=true;put('messages',m);}});
  State.selMode=false;State.selIds.clear();renderMessages();
}

function parseMusic(url){
  // 智能解析网易云分享链接,提取 songId
  let title='音乐分享', artist='网易云音乐', songId=null;
  // 匹配 song?id=数字、program?id=数字、playlist?id=数字 等
  const m1=url.match(/song\?id=(\d+)/);
  const m2=url.match(/[?&]id=(\d+)/);
  const id = m1?m1[1]:(m2?m2[1]:null);
  if(id){songId=id;title='网易云歌曲 #'+id;}
  // 歌名关键词(如果分享文本含 "《》" 包裹的文本)
  const m3=url.match(/《([^》]+)》/);
  if(m3) title=m3[1];
  return {url,title,artist,songId};
}
async function addMusic(info){const ex=State.music.find(x=>x.url===info.url);if(!ex){const rec={id:uid(),...info};State.music.push(rec);await put('music',rec);}}

/* 重设画布尺寸与上下文（resize handle 也用），保留已有内容 */
function initDrawCanvas(){
  const cv=$('#draw-canvas');
  const dataUrl=drawCtx?cv.toDataURL():null;  // 保留画过的痕迹
  const rect=cv.getBoundingClientRect();
  cv.width=rect.width*devicePixelRatio;
  cv.height=rect.height*devicePixelRatio;
  drawCtx=cv.getContext('2d');
  drawCtx.scale(devicePixelRatio,devicePixelRatio);
  drawCtx.lineCap='round';
  drawCtx.lineJoin='round';
  drawCtx.strokeStyle=drawColor;
  drawCtx.lineWidth=3;
  if(dataUrl){
    const img=new Image();
    img.onload=()=>{drawCtx.drawImage(img,0,0,rect.width,rect.height);};
    img.src=dataUrl;
  }
}
function initDrawEvents(){
  const cv=$('#draw-canvas');let drawing=false,last=null;
  // 关键：用 offsetX/offsetY，相对画布 padding-box，不受 scroll/transform 影响，完美同步笔触
  function pos(e){return {x:e.offsetX, y:e.offsetY};}
  cv.addEventListener('pointerdown',e=>{if(!drawCtx)return;drawing=true;last=pos(e);drawCtx.beginPath();drawCtx.moveTo(last.x,last.y);try{cv.setPointerCapture(e.pointerId);}catch(_){}});
  cv.addEventListener('pointermove',e=>{if(!drawing||!drawCtx)return;const pt=pos(e);drawCtx.lineTo(pt.x,pt.y);drawCtx.stroke();last=pt;});
  cv.addEventListener('pointerup',e=>{if(drawing){drawing=false;drawStack.push(cv.toDataURL());}});
  $$('#draw-panel .pen').forEach(pn=>pn.onclick=()=>{$$('#draw-panel .pen').forEach(x=>x.classList.remove('sel'));pn.classList.add('sel');drawColor=pn.dataset.c;if(drawCtx)drawCtx.strokeStyle=drawColor;});
  $('#draw-clear').onclick=()=>{if(!drawCtx)return;drawCtx.clearRect(0,0,cv.width,cv.height);drawStack=[];};
  $('#draw-undo').onclick=()=>{if(!drawCtx)return;drawStack.pop();redraw();};
  function redraw(){if(!drawCtx)return;drawCtx.clearRect(0,0,cv.width,cv.height);/* 简化:撤销仅清空当前未保存 */}
  // 发送：宽随画布自适应，高度=画布高度（保持原比例），画板高度可调就完整传递
  $('#draw-send').onclick=()=>{if(!drawCtx)return;const cv=$('#draw-canvas');const rect=cv.getBoundingClientRect();const outW=Math.round(rect.width*devicePixelRatio);const outH=Math.round(rect.height*devicePixelRatio);const oc=document.createElement('canvas');oc.width=outW;oc.height=outH;const octx=oc.getContext('2d');octx.fillStyle='#1a1d2a';octx.fillRect(0,0,outW,outH);octx.drawImage(cv,0,0,outW,outH);oc.toBlob(async b=>{if(b){await sendBlob('drawing',{blob:b});}$('#draw-panel').classList.remove('active');});};
  $('#draw-close').onclick=()=>{$('#draw-panel').classList.remove('active');};
  // 画板高度调节手柄
  let resY0=0,resH0=0;
  const rh=$('#draw-resize');
  rh.addEventListener('pointerdown',e=>{
    resY0=e.clientY;resH0=cv.offsetHeight;
    try{rh.setPointerCapture(e.pointerId);}catch(_){}
    e.preventDefault();e.stopPropagation();
  });
  rh.addEventListener('pointermove',e=>{
    if(!resY0)return;
    const d=e.clientY-resY0;
    const nh=Math.max(150,Math.min(640,resH0+d));
    cv.style.height=nh+'px';
    initDrawCanvas();
  });
  rh.addEventListener('pointerup',e=>{resY0=0;try{rh.releasePointerCapture(e.pointerId);}catch(_){}});
}

/* ===================== 语音录制 ===================== */
let mediaRec=null,mediaStream=null,recChunks=[],recStart=0,recCancelled=false;
async function startVoice(){
  const hint=$('#rec-hint');hint.classList.remove('cancel');hint.style.display='block';
  try{
    mediaStream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec=new MediaRecorder(mediaStream);
    recChunks=[];recCancelled=false;recStart=Date.now();
    mediaRec.ondataavailable=e=>{if(e.data.size)recChunks.push(e.data);};
    mediaRec.start();
    $('#voice-btn').classList.add('rec');
  }catch(err){hint.style.display='none';showToast('无法访问麦克风');}
}
function stopVoice(send){
  const hint=$('#rec-hint');hint.style.display='none';
  $('#voice-btn').classList.remove('rec');
  if(!mediaRec)return;
  mediaRec.onstop=async()=>{
    if(send&&!recCancelled&&recChunks.length){
      const blob=new Blob(recChunks,{type:recChunks[0].type||'audio/webm'});
      const dur=Math.round((Date.now()-recStart)/1000)+'′′';
      await sendBlob('voice',{blob,dur});
    }
    if(mediaStream)mediaStream.getTracks().forEach(t=>t.stop());
    mediaRec=null;mediaStream=null;
  };
  mediaRec.stop();
}

  document.querySelectorAll('.glass-panel.show').forEach(p=>{
    if(p.id!=='export-sheet') glassHide(p);
  });

  const btnRect=btn.getBoundingClientRect();
  const sheet=$('#export-sheet');
  sheet.innerHTML=`<div class="sheet-h">📥 导出「${esc(title)}」</div>
    <div style="padding:4px 6px 10px;font-size:12px;color:var(--text-faint);text-align:center">共 ${arr.length} 条消息</div>
    <button class="sheet-btn" data-a="txt"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/></svg>导出为 TXT 文本</button>
    <button class="sheet-btn" data-a="clip"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>复制到剪贴板</button>
    <button class="sheet-btn" data-a="cancel" style="color:var(--text-faint)">取消</button>`;

  // 先显示以测量真实尺寸
  sheet.style.display='';
  sheet.style.visibility='hidden';
  sheet.style.position='fixed';
  sheet.style.zIndex='60';
  const pw=sheet.offsetWidth||220, ph=sheet.offsetHeight||220;

  // 锚定按钮定位：弹窗右边与按钮左边对齐，间距 12px；不超屏幕边距 24px
  const gap=10;
  let top=btnRect.bottom+gap, left=btnRect.left-pw-12;
  if(top+ph>window.innerHeight-16){top=btnRect.top-ph-gap;}
  left=Math.max(16,Math.min(window.innerWidth-pw-24,left));
  top=Math.max(16,Math.min(window.innerHeight-ph-16,top));
  sheet.style.top=top+'px';
  sheet.style.left=left+'px';
  sheet.style.right='auto';
  sheet.style.bottom='auto';
  sheet.style.visibility='';

  showBackdrop();
  glassShow(sheet);

  // 点击遮罩 → 全局 backdrop handler 会关闭（已在 init 中绑定）
  // 但需阻止 sheet 内部点击冒泡到 backdrop
  sheet.addEventListener('pointerdown',e=>e.stopPropagation());
  // 按钮选项
  sheet.querySelectorAll('.sheet-btn').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    glassHide(sheet);
    const a=b.dataset.a;
    if(a==='txt'){doExportChat(arr,title,'txt');}
    else if(a==='clip'){doExportChat(arr,title,'clip');}
  });
}
function doExportChat(arr,title,mode){
  if(!arr.length){showToast('暂无消息可导出');return;}
  let text=`【${title}】\n`;
  text+=`导出时间：${fmtNow()}\n`;
  text+='─'.repeat(28)+'\n';
  let lastSender='';
  arr.forEach(m=>{
    const sender=contactName(m.senderId);
    const ts=m.timestampText||(m.ts?fmtTime(m.ts):'');
    if(sender!==lastSender){text+='\n'+(sender?'【'+sender+'】':'')+' '+(ts?'('+ts+')':'')+'\n';lastSender=sender;}
    else if(ts){text+='  '+ts+'\n';}
    const content=plainText(m).trim();
    if(content)text+=content+'\n';
    else if(m.type==='image'||m.type==='drawing')text+='[图片]\n';
    else if(m.type==='voice')text+='[语音 '+esc(m.dur||'')+']\n';
    else if(m.type==='file')text+='[文件: '+esc(m.fileName||'')+']\n';
    else if(m.type==='music')text+='[音乐: '+esc(m.title||'')+']\n';
    else if(m.type==='location')text+='[定位: '+esc(m.placeName||'')+']\n';
    else if(m.type==='sticker')text+='[表情贴纸]\n';
  });
  text+='─'.repeat(28)+'\n共 '+arr.length+' 条消息\n';
  if(mode==='clip'){
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>showToast('已复制到剪贴板'));}
    else{prompt('复制以下内容：',text);}
  }else{
    const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    const safe=title.replace(/[<>:"/\\|?*]/g,'_').trim()||'聊天';
    a.download=`${safe}_${fmtNow().replace(/[/:\s]/g,'')}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('已导出 TXT');
  }
}
