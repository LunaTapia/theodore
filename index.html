<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>语C · 多角色聊天</title>
<style>
/* ============ 主题与基础（可爱黑+半透明深灰+蓝灰）============ */
:root{
  --bg-0:#14141c;      /* 可爱黑（不那么死黑，带微蓝） */
  --bg-1:#1c1c28;      /* 深灰带蓝调 */
  --bg-glass:rgba(28,28,40,0.68);  /* 半透明深灰蓝 */
  --glass:rgba(255,255,255,0.07);
  --glass-strong:rgba(255,255,255,0.12);
  --glass-hover:rgba(255,255,255,0.16);
  --border:rgba(255,255,255,0.10);
  --border-soft:rgba(255,255,255,0.06);
  --text:#e8eaf0;
  --text-dim:rgba(232,234,240,0.52);
  --text-faint:rgba(232,234,240,0.30);
  --blue-gray:rgba(90,110,160,0.55);  /* 蓝灰色调 */
  --blue-gray-light:rgba(120,145,200,0.25);
  --me-1:#6a8fff; --me-2:#9b7fff;    /* 柔和蓝紫 */
  --bubble-other:rgba(32,32,45,0.78);
  --accent:#8b7cf5;
  --accent-glow:rgba(139,124,245,0.25);
  --danger:#ff6b7a;
  --ok:#5fd4a0;
  --radius:18px;
  --nav-h:64px;
  --font: "Fredoka One","Baloo 2","Bubblegum Sans","Comic Sans MS","Chewy","Patrick Hand","Nunito","Quicksand","迷你简丫丫体","幼圆","华文琥珀","站酷快乐体2017","站酷高端黑","YouYuan","Yuanti SC","PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--font);
  color:var(--text);
  background:
    radial-gradient(1400px 900px at 10% -5%, rgba(100,120,200,0.14), transparent 55%),
    radial-gradient(1100px 800px at 105% 105%, rgba(70,90,180,0.12), transparent 50%),
    radial-gradient(800px 600px at 50% 50%, rgba(60,80,160,0.07), transparent 60%),
    linear-gradient(165deg,var(--bg-1),var(--bg-0));
  background-attachment:fixed;
  overflow:hidden;
  -webkit-user-select:none;user-select:none;
  font-size:15px;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
input,textarea{font-family:inherit;color:inherit;}
img{display:block;-webkit-user-drag:none;}
::-webkit-scrollbar{width:0;height:0;}

/* ============ 布局骨架 ============ */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
.view{position:absolute;inset:0;display:none;flex-direction:column;}
.view.active{display:flex;}
#view-chat{flex:1;}

/* 顶部栏 */
.topbar{
  flex:0 0 auto;height:58px;padding-top:env(safe-area-inset-top);
  display:flex;align-items:center;gap:10px;padding-left:16px;padding-right:16px;
  backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  background:var(--glass);
  border-bottom:1px solid var(--border-soft);
  z-index:20;
}
.topbar .title{font-weight:700;font-size:19px;letter-spacing:.3px;}
.topbar .spacer{flex:1;}
.icon-btn{
  width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:var(--glass-strong);border:1px solid var(--border-soft);
  transition:transform .12s,background .2s;
}
.icon-btn:active{transform:scale(.92);background:rgba(255,255,255,0.18);}
.icon-btn svg{width:20px;height:20px;fill:none;stroke:var(--text);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* 列表滚动区 */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:24px;}

/* ============ 底部导航（悬浮小框） ============ */
#bottomnav{
  position:absolute;left:50%;bottom:calc(14px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  display:flex;gap:6px;
  background:var(--bg-glass);
  backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);
  border:1px solid var(--border);border-radius:22px;
  padding:6px 10px;z-index:30;
  box-shadow:0 8px 32px rgba(0,0,0,.45);
  transition:opacity .25s,transform .25s;
}
#bottomnav.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(20px);}
.nav-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  min-width:56px;padding:6px 8px;border-radius:16px;
  color:var(--text-faint);transition:all .18s;cursor:pointer;
}
.nav-item:active{background:var(--glass-hover);}
.nav-item.active{color:var(--text);background:var(--glass-strong);}
.nav-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-item .lbl{font-size:10px;font-weight:600;}

/* ============ 聊天列表 ============ */
.list-section{padding:8px 14px 0;}
.search-wrap{margin:10px 14px 6px;position:relative;}
.search-wrap input{
  width:100%;height:42px;border-radius:14px;border:1px solid var(--border-soft);
  background:var(--glass);padding:0 14px 0 40px;font-size:15px;outline:none;
}
.search-wrap .s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--text-dim);fill:none;stroke-width:2;stroke-linecap:round;}
.chat-item,.contact-item{
  display:flex;align-items:center;gap:12px;padding:10px 6px;border-radius:16px;
  transition:background .15s;position:relative;touch-action:pan-y;
}
.chat-item:active,.contact-item:active{background:var(--glass);}
.avatar{
  width:50px;height:50px;border-radius:50%;flex:0 0 auto;object-fit:cover;
  background:linear-gradient(135deg,#444,#222);border:1px solid var(--border-soft);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:20px;font-weight:700;overflow:hidden;
}
.avatar.sm{width:34px;height:34px;font-size:14px;}
.avatar.xs{width:26px;height:26px;font-size:11px;}
.avatar.med{width:64px;height:64px;font-size:24px;}
.meta{flex:1;min-width:0;}
.meta .name{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meta .prev{font-size:13px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.chat-item .right{text-align:right;color:var(--text-faint);font-size:12px;flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:10px;min-width:18px;height:18px;padding:0 5px;display:flex;align-items:center;justify-content:center;}
.drag-ghost{opacity:.4;}
.drag-over-up{box-shadow:0 -2px 0 0 var(--accent);}
.drag-over-down{box-shadow:0 2px 0 0 var(--accent);}

/* ============ 联系人 ============ */
.contact-grid{padding:10px 14px;display:flex;flex-direction:column;gap:2px;}

/* ============ 我 ============ */
.me-head{display:flex;flex-direction:column;align-items:center;gap:10px;padding:26px 0 14px;}
.me-name{font-size:22px;font-weight:800;}
.me-sub{font-size:13px;color:var(--text-dim);}
.panel{margin:10px 16px;background:var(--glass);border:1px solid var(--border-soft);border-radius:18px;overflow:hidden;}
.panel .row{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid var(--border-soft);}
.panel .row:last-child{border-bottom:none;}
.panel .row .t{flex:1;font-weight:600;}
.panel .row svg{width:20px;height:20px;stroke:var(--text-dim);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.fab{
  position:absolute;right:18px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);
  width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--me-1),var(--me-2));box-shadow:0 8px 24px rgba(124,92,255,.4);
  z-index:25;transition:transform .15s;
}
.fab:active{transform:scale(.9);}
.fab svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round;}

/* ============ 对话页 ============ */
#convo-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 12px 8px;display:flex;flex-direction:column;gap:3px;
  background:rgba(10,10,22,0.6);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.day-sep{align-self:center;font-size:11px;color:var(--text-faint);margin:6px 0;padding:2px 10px;background:var(--glass-strong);border-radius:10px;}

.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:100%;padding:2px 8px;border-radius:10px;position:relative;z-index:1;}
.msg-row.selected{background:rgba(139,124,245,.12);border:1.5px solid var(--accent);}
.msg-row.selected .select-box{background:var(--accent);border-color:var(--accent);}
.msg-row.selected .select-box svg{opacity:1;stroke:#fff;}
.select-box{
  width:22px;height:22px;flex:0 0 auto;border-radius:50%;border:2px solid var(--border);background:var(--glass-strong);
  display:flex;align-items:center;justify-content:center;align-self:center;margin-right:2px;
  transition:all .15s;
}
.select-box svg{width:14px;height:14px;opacity:.4;stroke:var(--text);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.msg-row:hover{background:rgba(255,255,255,0.03);}
.msg-row.me{flex-direction:row-reverse;}
.msg-row .av-slot{width:34px;flex:0 0 auto;}
.bubble-wrap{position:relative;flex:0 1 auto;max-width:74%;}
.msg-row.me .bubble-wrap{align-items:flex-end;margin-right:0;}
.bubble{
  position:relative;padding:9px 13px;border-radius:20px;font-size:15.5px;line-height:1.4;word-break:break-word;
  background:var(--bubble-bg, var(--bubble-other, rgba(28,28,46,.82)));border:1px solid var(--bubble-border, rgba(90,100,160,.22));
  backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
}
.msg-row.me .bubble{background:var(--bubble-bg, var(--bubble-me, rgba(45,45,65,.75)));border:1px solid var(--bubble-border, rgba(120,130,180,.25));backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);}
.bubble img.att{max-width:200px;border-radius:14px;margin-top:2px;image-rendering:-webkit-optimize-contrast;display:block;}
.bubble .file-chip,.bubble .loc-chip,.bubble .music-chip{
  display:flex;align-items:center;gap:10px;padding:8px;border-radius:14px;background:rgba(0,0,0,.18);
  margin-top:4px;min-width:180px;
}
.bubble .file-chip svg,.bubble .loc-chip svg,.bubble .music-chip svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;flex:0 0 auto;}
.bubble .file-chip .fn{flex:1;min-width:0;}
.bubble .file-chip .fn .t{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bubble .file-chip .fn .s{font-size:12px;opacity:.7;}
.voice-play{display:flex;align-items:center;gap:10px;min-width:160px;}
.voice-play .wave{width:34px;height:28px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.loc-map{width:100%;height:140px;border-radius:14px;overflow:hidden;position:relative;border:1px solid var(--border-soft);background:#1a1a20;}
.loc-map svg{border-radius:14px;}
.loc-pin{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);}
.bubble .loc-chip{display:block;padding:0;background:transparent;min-width:200px;}
.loc-name{font-weight:700;margin-bottom:8px;font-size:14px;color:var(--text);display:block;}
.music-chip{color:#fff;}
.music-chip .play{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.music-chip .play svg{width:16px;height:16px;stroke:#fff;fill:#fff;stroke-width:0;}
.music-chip .mi{flex:1;min-width:0;}
.music-chip .mi .tt{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.music-chip .mi .au{font-size:11px;opacity:.7;}

/* 引用 */
/* iMessage式引用气泡（淡蓝背景+蓝色左边框） */
.quote-box{display:flex;gap:6px;padding:5px 10px 5px 12px;border-radius:10px 10px 10px 4px;
  background:rgba(100,140,220,.15);margin-bottom:4px;font-size:13px;
  border-left:3px solid rgba(100,140,220,.65);
}
.msg-row.me .quote-box{background:rgba(100,140,220,.22);border-left-color:rgba(120,170,255,.7);}
.quote-box .qtxt{opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.quote-box .qdel{cursor:pointer;opacity:.5;margin-left:auto;flex-shrink:0;padding-left:4px;}

/* 内心戏 */
.inner-box{margin-top:5px;border:1px dashed rgba(255,255,255,.3);border-radius:12px;padding:6px 9px;font-size:13px;font-style:italic;opacity:.9;background:rgba(255,255,255,.05);}
.inner-box .ih{font-size:10px;opacity:.55;font-style:normal;letter-spacing:1px;}

/* 时间戳 → 微信式居中气泡 */
.ts-wrap{display:flex;justify-content:center;margin:8px 0;}
.ts-bubble{
  font-size:11px;color:var(--text-dim);padding:3px 10px;border-radius:10px;
  background:var(--glass-strong);border:1px solid var(--border-soft);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.ts-line{display:none;} /* 旧样式隐藏 */

/* ============ tapback → iMessage式气泡角标 ============ */
/* 整体隐藏旧的 tapbacks 定位，由 .msg-row 的 flex + order 控制新位置 */
.tapbacks{display:none;}
/* iMessage 风格反应小圆角气泡，叠加在气泡右下/左下角 */
.tapback-ios{
  position:absolute;bottom:-14px;z-index:5;
  display:flex;gap:3px;align-items:flex-end;
  pointer-events:none;
}
.msg-row.me .tapback-ios{left:-8px;right:auto;}
.msg-row:not(.me) .tapback-ios{right:-8px;left:auto;flex-direction:row-reverse;}
.tapback-ios .tb{
  pointer-events:all;cursor:pointer;
  min-width:22px;height:22px;padding:0 5px;
  border-radius:11px;
  background:var(--glass-strong);border:1px solid var(--border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;line-height:1;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  transition:transform .1s;
}
.tapback-ios .tb:active{transform:scale(1.2);}
.tapback-ios .tb.sel{background:rgba(124,92,255,.35);border-color:var(--accent);}



/* ============ 输入区 ============ */
#composer{
  flex:0 0 auto;background:rgba(13,13,18,.7);
  backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  border-top:1px solid var(--border);
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
.role-strip{display:flex;gap:8px;padding:4px 4px 8px;overflow-x:auto;align-items:center;}
.role-strip .avatar{border:2px solid transparent;transition:transform .12s,border-color .15s;}
.role-strip .avatar.cur{border-color:var(--accent);transform:scale(1.08);}
.role-strip .nm{font-size:10px;color:var(--text-dim);text-align:center;margin-top:2px;white-space:nowrap;}
.role-strip .rp{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;}
.input-line{display:flex;align-items:flex-end;gap:7px;}
.plus-btn,.sticker-btn,.send-btn,.voice-btn{
  width:40px;height:40px;flex:0 0 auto;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:var(--bg-glass);border:1px solid var(--border);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.send-btn{background:linear-gradient(135deg,var(--me-1),var(--me-2));border:none;}
.plus-btn svg,.sticker-btn svg,.send-btn svg,.voice-btn svg{width:22px;height:22px;stroke:var(--text);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
.send-btn svg{stroke:#fff;fill:#fff;stroke-width:0;}
.voice-btn.rec{background:var(--danger);}
.voice-btn.rec svg{stroke:#fff;}
#msg-input{
  flex:1;min-height:40px;max-height:120px;resize:none;border-radius:18px;border:1px solid var(--border);
  background:var(--bg-glass);padding:9px 14px;font-size:15.5px;line-height:1.35;outline:none;overflow-y:auto;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.inline-edit{display:none;flex-direction:column;gap:6px;padding:8px;background:var(--glass-strong);border-radius:14px;margin-bottom:6px;}
.inline-edit.active{display:flex;}
.inline-edit textarea{flex:1;min-height:36px;max-height:90px;border-radius:10px;background:var(--bg-1);border:1px solid var(--border-soft);padding:8px;font-size:14px;color:var(--text);outline:none;resize:none;}
.inline-edit .acts{display:flex;gap:8px;justify-content:flex-end;}
.mini-btn{padding:6px 14px;border-radius:10px;background:var(--bg-glass);border:1px solid var(--border);font-size:13px;font-weight:600;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:background .12s;}
.mini-btn:hover{background:var(--glass-hover);}

/* + 面板 */
#plus-panel{display:none;background:var(--glass-strong);border-top:1px solid var(--border-soft);padding:14px 10px;flex-wrap:wrap;gap:8px 4px;justify-content:space-around;}
#plus-panel.active{display:flex;}
.pp-item{display:flex;flex-direction:column;align-items:center;gap:5px;width:23%;font-size:11px;color:var(--text-dim);}
.pp-item .ic{width:50px;height:50px;border-radius:16px;background:var(--glass);border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center;}
.pp-item .ic svg{width:24px;height:24px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* 贴纸键盘 */
#sticker-panel{display:none;max-height:200px;overflow-y:auto;background:var(--glass-strong);border-top:1px solid var(--border-soft);padding:10px;grid-template-columns:repeat(4,1fr);gap:8px;}
#sticker-panel.active{display:grid;}
.sticker-cell{aspect-ratio:1;border-radius:14px;background:var(--glass);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.sticker-cell img{width:80%;height:80%;object-fit:contain;}

/* 画板 */
#plus-panel,#sticker-panel,#draw-panel{
  background:var(--bg-glass);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
}
#draw-panel{display:none;flex-direction:column;}
#draw-panel.active{display:flex;}
.draw-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px 8px;font-size:14px;color:var(--text-dim);}
.draw-header .icon-btn{width:28px;height:28px;border-radius:8px;background:var(--glass);border:1px solid var(--border-soft);font-size:16px;color:var(--text);}
#draw-canvas{width:100%;height:320px;background:#0a0c12;border-radius:12px;border:1px solid var(--border-soft);touch-action:none;}
.draw-tools{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.draw-tools .pen{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.draw-tools .pen.sel{border-color:#fff;}

/* ============ 弹出菜单 / 浮层（悬浮小框） ============ */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.overlay.active{display:flex;}
.sheet{
  width:auto;min-width:280px;max-width:92%;
  background:rgba(30,32,42,.75);
  backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);
  border:1px solid var(--border);border-radius:22px;
  padding:12px 14px;max-height:70%;overflow-y:auto;
  margin-bottom:calc(var(--nav-h) + 20px + env(safe-area-inset-bottom));
  transform:translateY(20px);opacity:0;transition:all .25s cubic-bezier(.4,0,.2,1);
}
.overlay.active .sheet{transform:translateY(0);opacity:1;}
.sheet-h{padding:6px 4px 10px;text-align:center;font-weight:700;font-size:15px;color:var(--text-dim);}
.sheet-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 12px;border-radius:14px;font-size:16px;font-weight:600;background:var(--glass);margin-bottom:7px;border:1px solid var(--border-soft);}
.sheet-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.sheet-btn.danger{color:var(--danger);}
.sheet-btn.primary{background:linear-gradient(135deg,var(--me-1),var(--me-2));color:#fff;justify-content:center;border:none;}
.sheet-divider{height:1px;background:var(--border-soft);margin:4px 0 8px;}

/* 长按气泡菜单 */
#ctx-menu{
  position:absolute;z-index:60;background:var(--bg-glass);backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--border);border-radius:16px;padding:6px;min-width:172px;display:none;
  box-shadow:0 12px 40px rgba(0,0,0,.45);
}
#ctx-menu .cm{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;font-size:14.5px;font-weight:600;}
#ctx-menu .cm:active{background:var(--glass-strong);}
#ctx-menu .cm svg{width:18px;height:18px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto;}
#ctx-menu .cm.danger{color:var(--danger);}

/* tapback 选择条 */
#tapback-bar{position:absolute;z-index:61;background:var(--bg-glass);backdrop-filter:blur(28px) saturate(200%);border:1px solid var(--border-glass);border-radius:32px;padding:10px 14px;display:none;gap:8px;box-shadow:0 12px 40px rgba(0,0,0,.45);overflow-x:auto;max-width:92vw;white-space:nowrap;}
#tapback-bar .tb{width:42px;min-width:42px;height:42px;flex:0 0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .15s;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);}
#tapback-bar .tb:active{transform:scale(1.12);background:rgba(255,255,255,.18);}
#tapback-bar .tb.sel{background:rgba(124,92,255,.35);border-color:rgba(139,124,245,.6);box-shadow:0 0 12px rgba(139,124,245,.4);}

/* 颜色面板 → 更大触摸区 */
#color-bar{position:absolute;z-index:61;background:rgba(28,28,34,.97);backdrop-filter:blur(22px);border:1px solid var(--border);border-radius:16px;padding:12px;display:none;gap:10px;flex-wrap:wrap;min-width:240px;box-shadow:0 8px 30px rgba(0,0,0,.5);}
#color-bar .c{width:40px;height:40px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.25);transition:transform .1s;flex:0 0 auto;box-shadow:0 2px 8px rgba(0,0,0,.3);}
#color-bar .c:active{transform:scale(1.15);border-color:rgba(255,255,255,.6);}
#color-bar::before{content:'气泡颜色';display:block;width:100%;font-size:11px;color:var(--text-faint);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase;}

/* 通用弹窗(表单) */
.modal{position:absolute;inset:0;z-index:70;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);padding:20px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.modal.active{display:flex;}
.modal .card{width:100%;max-width:360px;background:rgba(28,30,40,.80);border:1px solid var(--border);border-radius:20px;padding:18px;backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);}
.modal .card h3{margin:0 0 14px;font-size:18px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.field label{font-size:13px;color:var(--text-dim);}
.field input{height:42px;border-radius:12px;border:1px solid var(--border);background:var(--glass);padding:0 12px;font-size:15px;outline:none;}
.modal .acts{display:flex;gap:10px;margin-top:6px;}
.modal .acts .mini-btn{flex:1;text-align:center;}
.row-av{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.row-av .avatar{cursor:pointer;}

/* 音乐库 */
#music-lib{position:absolute;right:10px;top:64px;width:240px;max-height:50vh;overflow-y:auto;background:var(--bg-glass);backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--border);border-radius:16px;padding:8px;z-index:55;display:none;}
#music-lib.active{display:block;}
.music-item{display:flex;align-items:center;gap:10px;padding:9px;border-radius:12px;}
.music-item:active{background:var(--glass-strong);}
.music-item .ply{width:30px;height:30px;border-radius:50%;background:var(--glass-strong);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.music-item .ply svg{width:14px;height:14px;stroke:var(--text);fill:var(--text);stroke-width:0;}
.music-item .ti{flex:1;min-width:0;}
.music-item .ti .t{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.music-item .ti .a{font-size:11px;color:var(--text-dim);}
.music-item .del-music{width:24px;height:24px;flex:0 0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-faint);cursor:pointer;transition:all .15s;}
.music-item .del-music:hover{background:rgba(255,80,80,.2);color:var(--danger);}

/* 搜索结果 */
.search-res{padding:4px 0;}
.sr-item{padding:12px 16px;border-bottom:1px solid var(--border-soft);}
.sr-item .cn{font-size:12px;color:var(--text-dim);}
.sr-item .ct{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;}

/* 录音提示 */
.rec-hint{position:absolute;left:50%;top:30%;transform:translateX(-50%);background:rgba(0,0,0,.6);padding:10px 18px;border-radius:14px;font-size:14px;z-index:65;display:none;}
.rec-hint.cancel{background:rgba(255,90,106,.8);}

/* 空态 */
.empty{text-align:center;color:var(--text-faint);padding:60px 20px;font-size:14px;line-height:1.7;}

/* 选择联系人弹窗列表 */
.pick-list{max-height:50vh;overflow-y:auto;}
.pick-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:14px;}
.pick-item:active{background:var(--glass);}
.pick-item .check{width:22px;height:22px;border-radius:50%;border:2px solid var(--text-faint);flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
.pick-item.on .check{background:var(--accent);border-color:var(--accent);}
.pick-item.on .check svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}

/* 进度 */
.toast{position:absolute;left:50%;top:42%;transform:translateX(-50%);background:rgba(0,0,0,.78);padding:12px 20px;border-radius:14px;z-index:90;font-size:14px;display:none;}
.toast.active{display:block;}
.hidden{display:none!important;}
#sel-fab{position:absolute;left:50%;transform:translateX(-50%);bottom:150px;z-index:40;padding:10px 22px;border-radius:22px;background:linear-gradient(135deg,var(--me-1),var(--me-2));color:#fff;font-weight:700;font-size:14px;box-shadow:0 8px 24px rgba(124,92,255,.4);}
</style>
</head>

<script>
"use strict";
/* ===================== IndexedDB 封装 ===================== */
const DB_NAME='rpchat_db', DB_VER=1;
let db=null;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{const d=e.target.result;
    ['meta','contacts','chats','messages','stickers','music'].forEach(s=>{
      if(!d.objectStoreNames.contains(s)) d.createObjectStore(s,{keyPath:'id'});
    });
  };
  r.onsuccess=e=>{db=e.target.result;res(db);};
  r.onerror=e=>rej(e.target.error);
});}
function store(s,mode){return db.transaction(s,mode).objectStore(s);}
function p(requ){return new Promise((res,rej)=>{requ.onsuccess=()=>res(requ.result);requ.onerror=()=>rej(requ.error);});}
function put(s,v){return p(store(s,'readwrite').put(v));}
function del(s,k){return p(store(s,'readwrite').delete(k));}
function get(s,k){return p(store(s,'readonly').get(k));}
function getAll(s){return p(store(s,'readonly').getAll()).then(r=>r||[]);}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const clone=o=>JSON.parse(JSON.stringify(o));

/* ===================== 全局状态 ===================== */
const State={
  me:{id:'me',name:'我',avatar:null},
  contacts:[], chats:[], messages:{}, stickers:[], music:[],
  view:'chats', chatId:null,
  role:null,                 // 当前发送身份 id
  selMode:false, selIds:new Set(),
  editTarget:null,          // {type:'message'|'inner'|'ts'|'quote', msgId}
  quoteId:null,
  searchActive:false,
};
const COLORS=['rgba(88,101,242,.35)','rgba(88,101,180,.35)','rgba(235,69,95,.35)','rgba(46,204,113,.35)','rgba(241,196,15,.35)','rgba(155,89,182,.35)','rgba(26,188,156,.35)','rgba(52,73,94,.35)','rgba(149,165,166,.35)','rgba(44,62,80,.35)'];
const DEFAULT_MY_BUBBLE = 'rgba(45,45,65,.35)'; // "我"的默认气泡色
const TAPBACKS=['✅','❌','💩','🌹','👍','❤️','😂','☺️','🥵','🤡','👀','✨','😭','🤑','🏆'];

/* ===================== 工具 ===================== */
const $=s=>document.querySelector(s);
const $$=s=>Array.from(document.querySelectorAll(s));
function blobUrl(b){return b?URL.createObjectURL(b):null;}
function avatarHtml(av,bytes,cls){ // av: blob or dataurl
  if(av){return `<img class="avatar ${cls||''}" src="${typeof av==='string'?av:blobUrl(av)}" alt="">`;}
  const ch=bytes?bytes.slice(0,1):'·';
  return `<div class="avatar ${cls||''}">${ch}</div>`;
}
async function blobToB64(b){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(b);});}
function b64ToBlob(b64){const [h,data]=b64.split(',');const m=h.match(/:(.*?);base64/);const mt=m?m[1]:'application/octet-stream';const bin=atob(data);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mt});}
function showToast(t){const el=$('#toast');el.textContent=t;el.classList.add('active');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('active'),1600);}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';return (b/1048576).toFixed(1)+' MB';}

/* ===================== 初始化 ===================== */
async function init(){
  try{
    await openDB();
    await loadAll();
  }catch(e){
    console.warn('IndexedDB 不可用，切换到内存模式:',e);
    State._memoryMode=true;
    State.me={id:'me',name:'我',avatar:null};
    State.contacts=[];State.chats=[];State.stickers=[];State.music=[];State.messages={};
  }
  // 如果没有任何数据，自动填入演示数据
  if(!State.contacts.length){
    const c1={id:'user_1',name:'林小晴',avatar:null,color:'#a78bfa',order:0};
    const c2={id:'user_2',name:'顾晨曦',avatar:null,color:'#34d399',order:1};
    State.contacts.push(c1,c2);
    const msgs1=[
      {id:uid(),chatId:'chat_demo',senderId:'user_1',type:'text',text:'终于找到组织了！',ts:Date.now()-3600000},
      {id:uid(),chatId:'chat_demo',senderId:'me',type:'text',text:'欢迎欢迎～这里是语C多角色聊天',ts:Date.now()-3500000},
      {id:uid(),chatId:'chat_demo',senderId:'user_1',type:'text',text:'我刚学会一个超可爱的说话方式',ts:Date.now()-3000000},
      {id:uid(),chatId:'chat_demo',senderId:'user_2',type:'text',text:'什么什么？快说来听听！',ts:Date.now()-2900000},
      {id:uid(),chatId:'chat_demo',senderId:'user_1',type:'text',text:'就是...嘿嘿(*/ω＼*)',ts:Date.now()-2800000},
    ];
    const msgs2=[
      {id:uid(),chatId:'chat_2',senderId:'user_2',type:'text',text:'你看了今天的剧本吗',ts:Date.now()-7200000},
      {id:uid(),chatId:'chat_2',senderId:'me',type:'text',text:'看了看了！剧情好绝',ts:Date.now()-7100000},
    ];
    State.chats=[
      {id:'chat_demo',type:'group',title:'语C聊天室',avatar:null,participants:['user_1','user_2'],order:0,unread:0},
      {id:'chat_2',type:'single',title:null,avatar:null,participants:['user_2'],order:1,unread:1},
    ];
    State.messages={'chat_demo':msgs1,'chat_2':msgs2};
    if(!State._memoryMode){
      try{
        for(const c of State.contacts) await put('contacts',c);
        for(const c of State.chats) await put('chats',c);
        for(const cid in State.messages) for(const m of State.messages[cid]) await put('messages',m);
      }catch(_){}
    }
  }
  // 加载聊天背景和主题
  const bgMeta=await get('meta','chatBg');
  const themeMeta=await get('meta','chatTheme');
  if(bgMeta&&bgMeta.css){State.chatBg=bgMeta.css;applyBgToBody();}
  if(themeMeta&&themeMeta.theme){State.chatTheme=themeMeta.theme;applyThemeColors(themeMeta.theme);}
  bindGlobal();
  renderAll();
  if(!State.role) State.role='me';
}
async function loadAll(){
  const me=await get('meta','me');
  if(me){State.me={id:'me',name:me.name||'我',avatar:me.avatar||null,color:me.color||null};}
  State.contacts=await getAll('contacts');
  State.chats=await getAll('chats');
  State.stickers=await getAll('stickers');
  State.music=await getAll('music');
  const msgs=await getAll('messages');
  State.messages={};
  msgs.forEach(m=>{(State.messages[m.chatId]=State.messages[m.chatId]||[]).push(m);});
  for(const k in State.messages) State.messages[k].sort((a,b)=>a.order-b.order);
}
async function persistAll(){ // 保存 me 资料
  await put('meta','me',State.me);
}

function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

/* ===================== 长按 + 拖拽 ===================== */
function enableLongPress(el,cb){
  let timer=null,startX=0,startY=0;
  el.addEventListener('pointerdown',e=>{
    if(e.target.closest('.select-box'))return;
    startX=e.clientX;startY=e.clientY;
    timer=setTimeout(()=>{timer=null;cb();},450);
  });
  const cancel=()=>{if(timer){clearTimeout(timer);timer=null;}};
  el.addEventListener('pointermove',e=>{if(timer&&(Math.abs(e.clientX-startX)>8||Math.abs(e.clientY-startY)>8))cancel();});
  el.addEventListener('pointerup',cancel);
  el.addEventListener('pointerleave',cancel);
  el.addEventListener('contextmenu',e=>{e.preventDefault();cb();});
}
function enableDragSort(el,storeName,id){
  el.draggable=true;
  el.addEventListener('dragstart',e=>{State._dragId=id;State._dragMoved=false;el.classList.add('drag-ghost');e.dataTransfer.effectAllowed='move';});
  el.addEventListener('dragend',()=>{el.classList.remove('drag-ghost');$$('.'+el.className.split(' ')[0]).forEach(x=>x.classList.remove('drag-over-up','drag-over-down'));setTimeout(()=>State._dragMoved=false,80);});
  el.addEventListener('dragover',e=>{e.preventDefault();if(State._dragId&&State._dragId!==id){const r=el.getBoundingClientRect();const after=(e.clientY-r.top)>r.height/2;el.classList.toggle('drag-over-down',!after);el.classList.toggle('drag-over-up',after);}});
  el.addEventListener('drop',e=>{e.preventDefault();const tid=State._dragId;if(!tid||tid===id)return;State._dragMoved=true;reorder(storeName,tid,id);
    $$('.'+el.className.split(' ')[0]).forEach(x=>x.classList.remove('drag-over-up','drag-over-down'));});
}
function reorder(storeName,dragId,targetId){
  let arr = storeName==='chats'?State.chats:State.contacts;
  const sorted=arr.slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const from=sorted.findIndex(x=>x.id===dragId);
  const to=sorted.findIndex(x=>x.id===targetId);
  if(from<0||to<0||from===to)return;
  const [item]=sorted.splice(from,1);
  let insertAt = from<to ? to : to+1;
  sorted.splice(insertAt,0,item);
  sorted.forEach((x,i)=>{x.order=i;put(storeName,x);});
  if(storeName==='chats')renderChats();else renderContacts();
}

/* ===================== 消息渲染 ===================== */
function fmtTime(ts){

  const h=('0'+d.getHours()).slice(-2),mi=('0'+d.getMinutes()).slice(-2);

}

function bubbleInner(m,c,sender,isMe){
  let html=`<div class="bubble-wrap">`;
  // 引用
  if(m.quoteId){const q=findMsg(m.quoteId); if(q){html+=`<div class="quote-box"><div class="qtxt">${esc(contactName(q.senderId))}：${esc(quoteText(q))}</div><div class="qdel" data-qdel="${m.id}">×</div></div>`;}}
  // 气泡颜色：优先使用消息自定义颜色，否则对方用联系人主题色，"我"用个人资料设置的颜色
  let bubbleColor=m.color;
  if(!bubbleColor){
    if(isMe){
      bubbleColor=State.me.color||DEFAULT_MY_BUBBLE;
    }else if(sender&&sender.color){
      // 对方使用联系人主题色，保持35%不透明度
      const baseColor=sender.color.replace(/,\s*[\d.]+\)/,',.35)');
      bubbleColor=baseColor;
    }
  }
  let style=bubbleColor?`style="--bubble-bg:${bubbleColor};--bubble-border:${bubbleColor}"`:'';
  html+=`<div class="bubble" ${style}>`;
  html+=contentHtml(m);
  html+=`</div>`;
  // 内心戏
  if(m.innerThought){html+=`<div class="inner-box">${esc(m.innerThought)}</div>`;}
  // iMessage式贴纸反应（叠加在气泡角上）
  if(m.tapbacks&&m.tapbacks.length){
    html+=`<div class="tapback-ios" data-tb="${m.id}">`+m.tapbacks.map((t,i)=>`<div class="tb" data-idx="${i}">${t}</div>`).join('')+`</div>`;
  }
  html+=`</div>`;
  return html;
}
function quoteText(m){if(m.type==='text'||m.type==='sticker')return m.text;if(m.type==='image'||m.type==='drawing')return'[图片]';if(m.type==='voice')return'[语音]';if(m.type==='file')return'[文件]';if(m.type==='music')return'[音乐]';if(m.type==='location')return'[定位]';return m.text||'';}
function contentHtml(m){
  switch(m.type){
    case 'text': return esc(m.text).replace(/\n/g,'<br>');
    case 'image': case 'drawing': return `<img class="att" src="${blobUrl(m.blob)}" onclick="viewImage('${m.id}')">`;

    case 'music': return `<div class="music-chip" onclick="playMusicUrl('${encodeURIComponent(m.url||'')}','${esc(m.title||'')}')"><div class="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><div class="mi"><div class="tt">${esc(m.title||'音乐')}</div><div class="au">${esc(m.artist||'点击播放')}</div></div></div>`;
    case 'location': return `<div class="loc-chip"><div class="loc-name" onclick="editPlace('${m.id}')">${esc(m.placeName||'位置')}</div>${m.mapBlob ? `<img class="loc-map" src="${blobUrl(m.mapBlob)}" onclick="editLocImg('${m.id}')">` : locMapImg(m)}</div>`;
    default: return esc(m.text||'');
  }
}
function locMapImg(m){
  // 深色背景 + 满屏白色道路网
  const seed = m.id ? m.id.split('').reduce((a,b)=>a+b.charCodeAt(0),0) : Math.random()*1000|0;
  const rand = (n) => ((seed * 9301 + 49297) % 233280) / 233280 * n;
  
  // 生成密集道路网 - 布满整个区域
  let roads = '';
  // 横向主干道 - 粗白线
  for(let i=0; i<4; i++){
    const y = 12 + i * 22 + rand(8);
    roads += `<line x1="0" y1="${y}" x2="200" y2="${y}" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>`;
  }
  // 纵向主干道
  for(let i=0; i<5; i++){
    const x = 15 + i * 35 + rand(10);
    roads += `<line x1="${x}" y1="0" x2="${x}" y2="110" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>`;
  }
  // 横向次干道 - 中等
  for(let i=0; i<6; i++){
    const y = 8 + i * 16 + rand(6);
    roads += `<line x1="0" y1="${y}" x2="200" y2="${y}" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>`;
  }
  // 纵向次干道
  for(let i=0; i<7; i++){
    const x = 10 + i * 26 + rand(8);
    roads += `<line x1="${x}" y1="0" x2="${x}" y2="110" stroke="rgba(255,255,255,0.45)" stroke-width="1.2"/>`;
  }
  // 小巷 - 细线
  for(let i=0; i<10; i++){
    const y = 5 + i * 10 + rand(4);
    roads += `<line x1="0" y1="${y}" x2="200" y2="${y}" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>`;
  }
  for(let i=0; i<12; i++){
    const x = 5 + i * 16 + rand(5);
    roads += `<line x1="${x}" y1="0" x2="${x}" y2="110" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>`;
  }
  
  return `<div class="loc-map" onclick="editLocImg('${m.id}')" style="background:#1a1a20;border-radius:12px;overflow:hidden;cursor:pointer">
    <svg width="100%" height="100%" viewBox="0 0 200 110" preserveAspectRatio="xMidYMid slice">
      <!-- 深色背景 -->
      <rect width="200" height="110" fill="#1a1a20"/>
      
      <!-- 满屏道路网 -->
      ${roads}
      
      <!-- 红色定位标记 -->
      <g transform="translate(100,55)">
        <path d="M0 -18 C-10 -18 -16 -10 -16 0 C-16 14 0 30 0 30 C0 30 16 14 16 0 C16 -10 10 -18 0 -18" fill="#ff4444"/>
        <circle cx="0" cy="-2" r="5" fill="#fff"/>
      </g>
    </svg>
  </div>`;
}
function fakeMap(lat,lng){
  // 伦敦街道风格：米黄/浅棕底色 + 深灰道路网 + 深棕建筑块
  return `<div class="loc-map"><svg width="100%" height="100%" viewBox="0 0 200 110" preserveAspectRatio="xMidYMid slice">
    <defs>
      <filter id="pinShadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,.35)"/></filter>
    </defs>
    <!-- 背景：米黄色调 -->
    <rect width="200" height="110" fill="#f5f0e6" rx="8"/>
    <!-- 公园/绿地（淡绿） -->
    <rect x="8" y="8" width="32" height="22" rx="3" fill="#c8d6af"/>
    <rect x="128" y="62" width="48" height="38" rx="3" fill="#c8d6af"/>
    <!-- 街区建筑块（深棕/砖色） -->

async function handleMsgAction(a,m){
  if(a==='quote'){State.quoteId=m.id;showToast('已引用，发送新消息即可');return;}
  if(a==='edit'){openInline('message',m.id);return;}
  if(a==='del'){deleteMsg(m.id);return;}
  if(a==='copy'){const t=plainText(m);navigator.clipboard&&navigator.clipboard.writeText(t);showToast('已复制');return;}
  if(a==='inner'){ if(m.innerThought){openInline('inner',m.id);} else {openInline('inner',m.id);} return;}
  if(a==='ts'){ if(m.timestampText){editTs(m);} else {m.timestampText=fmtNow();await put('messages',m);renderMessages();} return;}
  if(a==='insert'){openInsert(m.id);return;}
  if(a==='multi'){enterSelectMode();return;}
  if(a==='tap'){openTapback(m);return;}
  if(a==='color'){openColor(m);return;}
}
function plainText(m){let t=quoteText(m);if(m.innerThought)t+='\n(内心：'+m.innerThought+')';if(m.timestampText)t+='\n'+m.timestampText;return t;}
function fmtNow(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function deleteMsg(id){const arr=State.messages[State.chatId];const i=arr.findIndex(x=>x.id===id);if(i<0)return;arr.splice(i,1);del('messages',id);renderMessages();}

/* 时间戳编辑 */
function editTs(m){
  const now=new Date();
  const def=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  promptModal('插入时间戳','格式：2026/10/1 20:03',m.timestampText||def,async v=>{
    m.timestampText=v;await put('messages',m);renderMessages();
  });
}

/* 贴纸回应 */
function openTapback(m,idxToRemove){
  const bar=$('#tapback-bar');
  bar.innerHTML=TAPBACKS.map(t=>`<div class="tb" data-t="${t}">${t}</div>`).join('');
  const row=$(`.msg-row[data-id="${m.id}"]`);const r=row.getBoundingClientRect();
  bar.style.display='flex';
  bar.style.top=Math.max(8,r.top-50)+'px';
  bar.style.left=Math.min(window.innerWidth-200,Math.max(8,r.left))+'px';
  bar.querySelectorAll('.tb').forEach(b=>b.onclick=async()=>{
    m.tapbacks=m.tapbacks||[];
    if(typeof idxToRemove==='number'){m.tapbacks.splice(idxToRemove,1);}
    if(b.classList.contains('sel')){m.tapbacks=m.tapbacks.filter(x=>x!==b.dataset.t);}
    else{m.tapbacks.push(b.dataset.t);}
    await put('messages',m);bar.style.display='none';renderMessages();
  });
  // 预先标记已选
  (m.tapbacks||[]).forEach(t=>{const el=bar.querySelector(`[data-t="${t}"]`);if(el)el.classList.add('sel');});
  const close=()=>{bar.style.display='none';document.removeEventListener('pointerdown',outside,true);};
  function outside(e){if(!bar.contains(e.target))close();}
  setTimeout(()=>document.addEventListener('pointerdown',outside,true),0);
}

/* 气泡颜色 */
function openColor(m){
  const bar=$('#color-bar');

  bar.querySelectorAll('.c').forEach(b=>b.onclick=async()=>{const idx=parseInt(b.dataset.idx);const color=COLORS[idx];m.color=color;await put('messages',m);bar.style.display='none';keepScroll(()=>renderMessages());});
  const close=()=>{bar.style.display='none';document.removeEventListener('pointerdown',outside,true);};

}

/* 内联编辑(消息/内心戏) */
function openInline(kind,msgId){
  const box=$('#inline-edit'); const ta=$('#inline-ta');
  State.editTarget={type:kind,msgId};

  ta.value = kind==='message'?m.text:(m.innerThought||'');

async function saveInline(){

  $('#inline-edit').classList.remove('active');
  State.editTarget=null;

}

async function insertMsg(afterId,data){
  const arr=State.messages[State.chatId]; const idx=arr.findIndex(x=>x.id===afterId);
  const order = idx<0? (arr.length?arr[arr.length-1].order+1:1) : arr[idx].order+0.5;
  const c=State.chats.find(x=>x.id===State.chatId);
  const msg={id:uid(),chatId:State.chatId,senderId:State.role,order, ...data};
  arr.push(msg); arr.sort((a,b)=>a.order-b.order);
  await put('messages',msg);
  // 更新预览
  updateChatPreview();
  renderMessages();
}
function updateChatPreview(){const c=State.chats.find(x=>x.id===State.chatId);if(c){c.unread=c.unread||0;put('chats',c);}}

/* ===================== 多选模式 ===================== */
function enterSelectMode(){State.selMode=true;State.selIds.clear();renderMessages();showToast('多选模式：点消息勾选');}
function toggleSelect(id){
  if(State.selIds.has(id))State.selIds.delete(id);else State.selIds.add(id);
  // 只更新UI，不重绘整个列表（避免闪烁）
  const row=document.querySelector(`.msg-row[data-id="${id}"]`);
  if(row)row.classList.toggle('selected',State.selIds.has(id));
  const sf=$('#sel-fab');
  if(sf){sf.classList.toggle('hidden',!(State.selMode&&State.selIds.size>0));sf.textContent='操作所选 ('+State.selIds.size+')';}
}
function exitSelectMode(){State.selMode=false;State.selIds.clear();renderMessages();}
function selectMenu(){
  const sheet=$('#sheet');
  const n=State.selIds.size;
  sheet.innerHTML=`<div class="sheet-h">已选 ${n} 条</div>
    <button class="sheet-btn" data-a="merge">合并为一条</button>
    <button class="sheet-btn" data-a="chain">虚线连接</button>
    <button class="sheet-btn" data-a="cancel">取消选择</button>`;
  openSheet();
  sheet.querySelectorAll('.sheet-btn').forEach(b=>b.onclick=async()=>{
    const a=b.dataset.a;closeSheet();
    if(a==='merge')await mergeSelected();
    else if(a==='chain')await chainSelected();
    else exitSelectMode();
  });
}
async function mergeSelected(){
  const arr=State.messages[State.chatId];
  const sel=arr.filter(m=>State.selIds.has(m.id)).sort((a,b)=>a.order-b.order);
  if(sel.length<2){showToast('至少选择2条');exitSelectMode();return;}
  const combined=sel.map(m=>`${contactName(m.senderId)}：${quoteText(m)}`).join('\n');
  const first=sel[0];
  const msg={id:uid(),chatId:State.chatId,senderId:State.role,order:first.order,type:'text',text:combined,ts:Date.now(),chained:true};
  sel.forEach(m=>{del('messages',m.id);const i=arr.findIndex(x=>x.id===m.id);if(i>=0)arr.splice(i,1);});
  arr.push(msg);arr.sort((a,b)=>a.order-b.order);
  await put('messages',msg);
  State.selIds.clear();State.selMode=false;renderMessages();
}
async function chainSelected(){
  const arr=State.messages[State.chatId];
  arr.forEach(m=>{if(State.selIds.has(m.id)){m.chained=true;put('messages',m);}});
  State.selMode=false;State.selIds.clear();renderMessages();
}

/* ===================== 发送消息 ===================== */
async function sendText(){
  const ta=$('#msg-input'); let text=ta.value.trim(); if(!text&&!State.quoteId)return;
  const arr=State.messages[State.chatId]||(State.messages[State.chatId]=[]);
  const order=arr.length?arr[arr.length-1].order+1:1;
  const msg={id:uid(),chatId:State.chatId,senderId:State.role,order,type:'text',text,ts:Date.now()};
  if(State.quoteId){msg.quoteId=State.quoteId;State.quoteId=null;}
  arr.push(msg);await put('messages',msg);
  ta.value='';autoGrow(ta);
  renderMessages();
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const s=$('#convo-scroll'); if(s) s.scrollTop=s.scrollHeight;
  }));
}
async function sendBlob(type,data){
  const arr=State.messages[State.chatId]||(State.messages[State.chatId]=[]);
  const order=arr.length?arr[arr.length-1].order+1:1;
  const msg={id:uid(),chatId:State.chatId,senderId:State.role,order,type,...data,ts:Date.now()};
  arr.push(msg);await put('messages',msg);
  keepScroll(()=>renderMessages());
}
function keepScroll(fn){const s=$('#convo-scroll');const top=s.scrollTop,height=s.scrollHeight;s.classList.add('scroll');fn();requestAnimationFrame(()=>{s.scrollTop=top+(s.scrollHeight-height);});}

function renderStickers(){

  State.stickers.forEach(st=>{
    const cell=document.createElement('div');cell.className='sticker-cell';cell.dataset.id=st.id;
    cell.innerHTML=`<img src="${blobUrl(st.blob)}" alt="">`;

}

function parseMusic(url){

/* ===================== 画板 ===================== */
let drawCtx,drawColor='#ff5a6a',drawStack=[];
function toggleDraw(on){
  $('#plus-panel').classList.remove('active');
  $('#draw-panel').classList.toggle('active',on);
  if(on){const cv=$('#draw-canvas');const rect=cv.getBoundingClientRect();const h=rect.height||320;cv.width=rect.width*devicePixelRatio;cv.height=h*devicePixelRatio;drawCtx=cv.getContext('2d');drawCtx.scale(devicePixelRatio,devicePixelRatio);drawCtx.lineCap='round';drawCtx.lineJoin='round';drawCtx.strokeStyle=drawColor;drawCtx.lineWidth=3;}
}
function initDrawEvents(){
  const cv=$('#draw-canvas');let drawing=false,last=null;
  function pos(e){const r=cv.getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top};}
  cv.addEventListener('pointerdown',e=>{if(!drawCtx)return;drawing=true;last=pos(e);drawCtx.beginPath();drawCtx.moveTo(last.x,last.y);try{cv.setPointerCapture(e.pointerId);}catch(_){}});
  cv.addEventListener('pointermove',e=>{if(!drawing||!drawCtx)return;const pt=pos(e);drawCtx.lineTo(pt.x,pt.y);drawCtx.stroke();last=pt;});
  cv.addEventListener('pointerup',e=>{if(drawing){drawing=false;drawStack.push(cv.toDataURL());}});
  $$('#draw-panel .pen').forEach(pn=>pn.onclick=()=>{$$('#draw-panel .pen').forEach(x=>x.classList.remove('sel'));pn.classList.add('sel');drawColor=pn.dataset.c;if(drawCtx)drawCtx.strokeStyle=drawColor;});
  $('#draw-clear').onclick=()=>{if(!drawCtx)return;drawCtx.clearRect(0,0,cv.width,cv.height);drawStack=[];};
  $('#draw-undo').onclick=()=>{if(!drawCtx)return;drawStack.pop();redraw();};
  function redraw(){if(!drawCtx)return;drawCtx.clearRect(0,0,cv.width,cv.height);/* 简化：撤销仅清空当前未保存 */}
  $('#draw-send').onclick=()=>{if(!drawCtx)return;const cv=$('#draw-canvas');const rect=cv.getBoundingClientRect();const ratio=rect.height/rect.width;const outW=800;const outH=Math.round(outW*ratio);const oc=document.createElement('canvas');oc.width=outW;oc.height=outH;const octx=oc.getContext('2d');octx.fillStyle='#1a1d2a';octx.fillRect(0,0,outW,outH);octx.drawImage(cv,0,0,outW,outH);oc.toBlob(async b=>{if(b){await sendBlob('drawing',{blob:b});}$('#draw-panel').classList.remove('active');});};
  $('#draw-close').onclick=()=>{$('#draw-panel').classList.remove('active');};
}

/* ===================== 语音录制 ===================== */
let mediaRec=null,mediaStream=null,recChunks=[],recStart=0,recCancelled=false;
async function startVoice(){
  const hint=$('#rec-hint');hint.classList.remove('cancel');hint.style.display='block';
  try{
    mediaStream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec=new MediaRecorder(mediaStream);
    recChunks=[];recCancelled=false;recStart=Date.now();
    mediaRec.ondataavailable=e=>{if(e.data.size)recChunks.push(e.data);};
    mediaRec.start();
    $('#voice-btn').classList.add('rec');
  }catch(err){hint.style.display='none';showToast('无法访问麦克风');}
}
function stopVoice(send){
  const hint=$('#rec-hint');hint.style.display='none';
  $('#voice-btn').classList.remove('rec');
  if(!mediaRec)return;
  mediaRec.onstop=async()=>{
    if(send&&!recCancelled&&recChunks.length){
      const blob=new Blob(recChunks,{type:recChunks[0].type||'audio/webm'});
      const dur=Math.round((Date.now()-recStart)/1000)+'″';
      await sendBlob('voice',{blob,dur});
    }
    if(mediaStream)mediaStream.getTracks().forEach(t=>t.stop());
    mediaRec=null;mediaStream=null;
  };
  mediaRec.stop();
}

/* ===================== 备份 / 恢复 ===================== */
async function downloadBackup(){
  showToast('正在打包备份…');
  const data={v:1,me:null,contacts:[],chats:[],messages:[],stickers:[],music:[]};
  const me=await get('meta','me'); data.me=me?{name:me.name,avatar:me.avatar?await blobToB64(me.avatar):null}:null;
  for(const c of State.contacts) data.contacts.push({...c,avatar:c.avatar?await blobToB64(c.avatar):null});
  for(const c of State.chats) data.chats.push({...c,avatar:c.avatar?await blobToB64(c.avatar):null});
  const allMsgs=await getAll('messages');
  for(const m of allMsgs){const o={...m};if(o.blob)o.blob=await blobToB64(o.blob);data.messages.push(o);}
  for(const s of State.stickers) data.stickers.push({...s,blob:await blobToB64(s.blob)});
  for(const m of State.music) data.music.push({...m});
  const json=JSON.stringify(data);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rpchat-backup-'+Date.now()+'.json';a.click();
  showToast('备份已下载');
}
async function uploadBackup(){
  const i=$('#backup-input');i.value='';i.onchange=async()=>{const f=i.files[0];if(!f)return;showToast('恢复中…');
    try{
      const text=await f.text();const data=JSON.parse(text);
      // 清空现有
      for(const s of ['contacts','chats','messages','stickers','music']){(await getAll(s)).forEach(r=>del(s,r.id));}
      if(data.me){await put('meta',{k:'me',name:data.me.name,avatar:data.me.avatar?b64ToBlob(data.me.avatar):null});}
      for(const c of (data.contacts||[])){await put('contacts',{...c,avatar:c.avatar?b64ToBlob(c.avatar):null});}
      for(const c of (data.chats||[])){await put('chats',{...c,avatar:c.avatar?b64ToBlob(c.avatar):null});}
      for(const m of (data.messages||[])){await put('messages',{...m,blob:m.blob?b64ToBlob(m.blob):null});}
      for(const s of (data.stickers||[])){await put('stickers',{...s,blob:b64ToBlob(s.blob)});}
      for(const m of (data.music||[])){await put('music',m);}
      await loadAll();renderAll();showToast('恢复完成');
    }catch(e){showToast('备份文件无效');}
  };i.click();
}
function renderAll(){renderChats();renderContacts();renderMe();renderStickers();}

/* ===================== 搜索 ===================== */
function doSearch(q){
  q=q.trim().toLowerCase(); if(!q){return;}
  const results=[];
  for(const cid in State.messages){
    State.messages[cid].forEach(m=>{
      if(plainText(m).toLowerCase().includes(q)){results.push({cid,m});}
    });
  }
  const wrap=$('#chat-list');
  if(!results.length){wrap.innerHTML='<div class="empty">未找到匹配的消息</div>';return;}
  wrap.innerHTML='<div class="search-res">'+results.map(r=>{
    const c=State.chats.find(x=>x.id===r.cid);
    return `<div class="sr-item" data-cid="${r.cid}" data-mid="${r.m}"><div class="cn">${esc(chatTitle(c))} · ${esc(contactName(r.m.senderId))}</div><div class="ct">${esc(plainText(r.m)).slice(0,60)}</div></div>`;
  }).join('')+'</div>';
  wrap.querySelectorAll('.sr-item').forEach(it=>it.onclick=()=>{openChat(it.dataset.cid);setTimeout(()=>{const row=$(`.msg-row[data-id="${it.dataset.mid}"]`);if(row)row.scrollIntoView({block:'center'});},200);});
}

/* ===================== 输入自适应 / 键盘稳定 ===================== */
function autoGrow(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,120)+'px';}
function bindGlobal(){
  // 导航
  $$('.nav-item').forEach(n=>n.onclick=()=>{if(State.chatId){/* 返回列表 */}switchView(n.dataset.view);});
  // 返回
  $('#back-to-list').onclick=()=>{State.chatId=null;switchView('chats');};
  // 新建群聊
  $('#new-chat-fab').onclick=newGroup;
  // 添加联系人
  $('#add-contact').onclick=()=>{promptModal('添加联系人','输入名字','',async name=>{if(!name)return;colorModal(async col=>{const c={id:uid(),name,avatar:null,color:col,order:State.contacts.length};State.contacts.push(c);await put('contacts',c);renderContacts();});});};
  // 搜索
  $('#search-toggle').onclick=()=>{$('#search-wrap').classList.toggle('hidden');if(!$('#search-wrap').classList.contains('hidden'))$('#search-input').focus();else renderChats();};
  $('#search-input').oninput=e=>doSearch(e.target.value);
  // 我
  $('#edit-me').onclick=editMe;
  $('#my-avatar').onclick=editMe;$('#my-name').onclick=editMe;
  $('#set-bg').onclick=setChatBackground;
  $('#dl-backup').onclick=downloadBackup;
  $('#up-backup').onclick=uploadBackup;
  // 音乐库
  $('#music-lib-btn').onclick=toggleMusicLib;
  $('#new-group-btn').onclick=newGroupChat;
  $('#chat-new-btn').onclick=newGroupChat;
  // 角色条已动态
  // 输入区
  const ta=$('#msg-input');
  ta.addEventListener('input',()=>autoGrow(ta));
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}});
  $('#send-btn').onclick=sendText;
  $('#sticker-btn').onclick=()=>{$('#plus-panel').classList.remove('active');$('#sticker-panel').classList.toggle('active');renderStickers();};
  $('#plus-btn').onclick=()=>{$('#sticker-panel').classList.remove('active');$('#plus-panel').classList.toggle('active');};
  buildPlusPanel();
  // 内联保存/取消
  $('#inline-save').onclick=saveInline;
  $('#inline-cancel').onclick=()=>{document.getElementById('inline-edit').classList.remove('active');State.editTarget=null;};
  // 画板
  initDrawEvents();
  // 语音
  const vb=$('#voice-btn');
  vb.addEventListener('pointerdown',async e=>{e.preventDefault();await startVoice();
    vb._move=e2=>{if(e2.clientY<window.innerHeight-120){$('#rec-hint').classList.add('cancel');$('#rec-hint').textContent='松手取消';recCancelled=true;}else{$('#rec-hint').classList.remove('cancel');$('#rec-hint').textContent='上滑取消 · 松手发送';recCancelled=false;}};
    vb._up=()=>{window.removeEventListener('pointermove',vb._move);window.removeEventListener('pointerup',vb._up);stopVoice(!recCancelled);};
    window.addEventListener('pointermove',vb._move);window.addEventListener('pointerup',vb._up);
  });
  // sheet 关闭
  $('#sheet-overlay').onclick=e=>{if(e.target.id==='sheet-overlay')closeSheet();};
  $('#sel-fab').onclick=selectMenu;
  // modal 点击空白关闭
  $('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.remove('active');};
  // 键盘稳定：输入时禁止内容上推
  ta.addEventListener('focus',()=>{/* 保持 */});
  // 监听对话页多选：若 selMode 且有选中，提供菜单入口（长按背景）
  $('#convo-scroll').addEventListener('contextmenu',e=>{if(State.selMode&&State.selIds.size>0){e.preventDefault();selectMenu();}});
  // 当进入多选且已选，点击空白处也可弹出菜单（长按背景）
  document.addEventListener('selectionchange',()=>{});
  // 多选模式下，点击空白区域弹出操作菜单
  $('#convo-scroll').addEventListener('pointerlongpressnone',()=>{});
  // 提供一个隐藏的全局多选菜单触发：双击标题栏进入多选？简化：长按消息已可进入；此处在 selMode 下点击空白给出菜单
  $('#view-chat').addEventListener('pointerdown',e=>{
    if(State.selMode && State.selIds.size>0 && !e.target.closest('.msg-row')){ /* 避免误触 */ }
  });
  // 多选操作：通过长按消息后"多选"进入；进入后再次长按空白弹菜单
  $('#convo-scroll').addEventListener('pointerdown',e=>{
    if(State.selMode && State.selIds.size>0 && e.target.closest('#convo-scroll') && !e.target.closest('.msg-row')){
      // 长按空白 -> 操作菜单
      let t=setTimeout(()=>selectMenu(),450);
      const cl=()=>{clearTimeout(t);document.removeEventListener('pointerup',cl);document.removeEventListener('pointermove',mv);};
      const mv=ev=>{if(ev.movementY>10){clearTimeout(t);}};
      document.addEventListener('pointerup',cl);document.addEventListener('pointermove',mv);
    }
  });
  // 退出对话时重置面板
  // 全局点击隐藏音乐库
  document.addEventListener('pointerdown',e=>{if(!e.target.closest('#music-lib')&&!e.target.closest('#music-lib-btn'))$('#music-lib').classList.remove('active');});
}

/* ===================== 启动 ===================== */
window.addEventListener('DOMContentLoaded',()=>{init();});
window.addEventListener('beforeunload',()=>{}); // IndexedDB 已即时持久化
</script>
