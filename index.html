/* 新建群聊 */
function newGroupChat(anchor){newGroup(anchor);}
function newGroup(anchor){
  let picked=new Set();
  // 浮动玻璃面板，贴近触发按钮
  const panel=document.createElement('div');
  panel.className='glass-panel';
  panel.id='group-picker-panel';
  const render=()=>{
    panel.innerHTML=`<div class="gp-head">选择联系人建群</div>
      <div class="gp-scroll pick-list">`+
      (sortedContacts().map(c=>`<div class="pick-item ${picked.has(c.id)?'on':''}" data-id="${c.id}"><div class="check"><svg viewBox="0 0 24 24"><path d="M5 12l5 5 9-11"/></svg></div>${avatarHtml(c.avatar,c.name,'sm')}<div class="meta"><div class="name">${esc(c.name)}</div></div></div>`).join('')||'<div style="padding:14px;color:var(--text-faint)">无联系人</div>')+
      `</div>
      <div class="gp-foot"><button class="gp-btn primary" id="grp-create">创建群聊 (${picked.size})</button></div>`;
    panel.querySelectorAll('.pick-item').forEach(it=>it.onclick=()=>{const id=it.dataset.id;if(picked.has(id))picked.delete(id);else picked.add(id);render();});
    panel.querySelector('#grp-create').onclick=async()=>{
      if(picked.size===0){showToast('至少选1人');return;}
      glassHide(panel);hideBackdrop();
      setTimeout(()=>panel.remove(),250);
      const c={id:uid(),type:'group',title:null,avatar:null,participants:[...picked],order:State.chats.length,unread:0};
      State.chats.push(c);await put('chats',c);renderChats();openChat(c.id);
    };
  };
  render();
  document.body.appendChild(panel);
  showBackdrop();
  // 定位：贴近按钮（以顶栏右上角 + 为默认）
  const target=anchor||document.querySelector('#new-group-btn')||document.querySelector('#new-chat-fab')||document.querySelector('#chat-new-btn');
  if(target){
    // 先隐藏测实际尺寸（避免 calcPanelPos 用猜的 width/height 偏差）
    panel.style.position='fixed';
    panel.style.visibility='hidden';
    panel.style.display='flex';
    panel.style.left='0';panel.style.top='0';
    document.body.appendChild(panel);
    const r=target.getBoundingClientRect();
    const pw=panel.offsetWidth||280;
    const ph=panel.offsetHeight||320;
    let pos=calcPanelPos(r,pw,ph,8);
    // 如果 + 按钮在屏幕右半边，重写 left 让面板**右边缘**对齐按钮**右边缘**（避免面板偏到左边）
    const vp=getViewport();
    if(r.left+r.width/2 > vp.w/2){
      pos.left=Math.max(8, r.right-pw);
    }
    panel.style.position='fixed';
    panel.style.visibility='';
    panel.style.left=pos.left+'px';
    panel.style.top=pos.top+'px';
    panel.style.transform='';
    // 加上连接箭头（只在按钮下方时才需要）
    if(pos.dir==='down'){
      const arrow=document.createElement('div');
      arrow.className='gp-arrow-up';
      // 箭头对准按钮中心（夹紧到面板内 12~pw-12）
      const arrowX=Math.max(12,Math.min(pw-26, r.left+r.width/2-pos.left-7));
      arrow.style.right=(pw-arrowX-7)+'px';
      panel.insertBefore(arrow,panel.firstChild);
    }
  } else {
    panel.style.position='fixed';
    panel.style.left='50%';panel.style.top='50%';
    panel.style.transform='translate(-50%,-50%)';
  }
  // 最终安全夹紧：防止面板任何情况下超出声口
  clampPanelToViewport(panel);
  // 显示动画
  requestAnimationFrame(()=>{panel.classList.add('show');});
  // 点外面关闭
  setTimeout(()=>{
    document.addEventListener('pointerdown',function outside(e){
      if(panel.contains(e.target)||(target&&target.contains(e.target)))return;
      glassHide(panel);hideBackdrop();
      document.removeEventListener('pointerdown',outside,true);
      setTimeout(()=>panel.remove(),250);
    },true);
  },0);
}

async function applyBackground(css, theme){
  State.chatBg=css;
  State.chatTheme=theme||null;
  await put('meta',{id:'chatBg',css});
  if(theme) await put('meta',{id:'chatTheme',theme});
  applyBgToBody();
  applyThemeColors(theme);
}
function applyBgToBody(){
  const wp=$('#wallpaper');
  if(!wp)return;
  if(State.chatBg){
    wp.style.background=State.chatBg;
  }else{
    wp.style.background='';
  }
}
function applyThemeColors(theme){
  if(!theme){
    // 恢复默认主题
    document.documentElement.style.removeProperty('--accent');
    document.documentElement.style.removeProperty('--text');
    return;
  }
  // 应用主题色(只改背景和强调色,不改气泡)
  document.documentElement.style.setProperty('--accent',theme.accent);
  document.documentElement.style.setProperty('--text',theme.text);
}

/* ===================== 备份 / 恢复 ===================== */
/* 轻量备份:不打包 blob,体积会小 10~100 倍 */
async function downloadBackup(lightweight){
  showToast('正在打包备份...');
  const data={v:1,mode:lightweight?'lite':'full',ts:Date.now(),me:null,chatBg:null,chatTheme:null,contacts:[],chats:[],messages:[],stickers:[],music:[]};
  const me=await get('meta','me');
  data.me=me?{name:me.name,avatar:lightweight?null:(me.avatar?await blobToB64(me.avatar):null)}:null;
  // 备份壁纸/主题
  const bgMeta=await get('meta','chatBg');
  const themeMeta=await get('meta','chatTheme');
  if(bgMeta&&bgMeta.css) data.chatBg=bgMeta.css;
  if(themeMeta&&themeMeta.theme) data.chatTheme=themeMeta.theme;
  for(const c of State.contacts) data.contacts.push({...c,avatar:lightweight?null:(c.avatar?await blobToB64(c.avatar):null)});
  for(const c of State.chats) data.chats.push({...c,avatar:lightweight?null:(c.avatar?await blobToB64(c.avatar):null)});
  const allMsgs=await getAll('messages');
  for(const m of allMsgs){
    const o={...m};
    if(o.blob){
      if(lightweight){o.blob=null;o._noBlob=true;}else{o.blob=await blobToB64(o.blob);}
    }
    data.messages.push(o);
  }
  for(const s of State.stickers) data.stickers.push(lightweight?{id:s.id}:{...s,blob:await blobToB64(s.blob)});
  for(const m of State.music) data.music.push({...m});
  const json=JSON.stringify(data);
  const blob=new Blob([json],{type:'application/json'});
  const sizeKB=(blob.size/1024).toFixed(1);
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rpchat-'+(lightweight?'lite':'full')+'-'+Date.now()+'.json';a.click();
  showToast('备份已下载('+(lightweight?'轻量':sizeKB+'KB')+')');
}

async function uploadBackup(){
  const i=$('#backup-input');i.value='';i.onchange=async()=>{const f=i.files[0];if(!f)return;
    const sizeKB=(f.size/1024).toFixed(1);
    showToast('恢复中('+sizeKB+'KB)...');
    try{
      const text=await f.text();
      let data;
      try{data=JSON.parse(text);}catch(e){showToast('备份文件无效(不是 JSON)');return;}
      if(!data||typeof data!=='object'||!data.v){showToast('备份文件无效(格式不对)');return;}
      // 清空现有(用一个 transaction 一次性处理)
      for(const s of ['contacts','chats','messages','stickers','music']){
        const rows=await getAll(s);
        for(const r of rows) await del(s,r.id);
      }
      // 兼容:me 使用 id 字段而非 k
      if(data.me){
        await put('meta',{id:'me',name:data.me.name||'我',avatar:data.me.avatar?b64ToBlob(data.me.avatar):null,color:data.me.color||null});
      }
      for(const c of (data.contacts||[])){await put('contacts',{...c,avatar:c.avatar?b64ToBlob(c.avatar):null});}
      for(const c of (data.chats||[])){await put('chats',{...c,avatar:c.avatar?b64ToBlob(c.avatar):null});}
      for(const m of (data.messages||[])){await put('messages',{...m,blob:m.blob?b64ToBlob(m.blob):null});}
      for(const s of (data.stickers||[])){
        if(s.blob){await put('stickers',{...s,blob:b64ToBlob(s.blob)});}
        else{await put('stickers',{id:s.id});}
      }
      for(const m of (data.music||[])){await put('music',m);}
      // 恢复壁纸/主题
      if(data.chatBg){
        await put('meta',{id:'chatBg',css:data.chatBg});
        State.chatBg=data.chatBg;
      }
      if(data.chatTheme){
        await put('meta',{id:'chatTheme',theme:data.chatTheme});
        State.chatTheme=data.chatTheme;
      }
      applyBgToBody();
      applyThemeColors(State.chatTheme);
      await loadAll();renderAll();
      syncLocalBackup();
      showToast('恢复完成('+(data.contacts?.length||0)+' 联系人,'+(data.messages?.length||0)+' 消息)');
    }catch(e){console.error(e);showToast('备份文件无效('+(e.message||'未知错误')+')');}
  };i.click();
}
/* localStorage 同步备份(不含 blob,仅元数据,限 5MB) */
function syncLocalBackup(){
  try{
    const lite={v:2,ts:Date.now(),me:State.me?{name:State.me.name,color:State.me.color}:null,chatBg:State.chatBg||null,chatTheme:State.chatTheme||null,contacts:State.contacts,chats:State.chats,messages:{},stickers:State.stickers.map(s=>({id:s.id})),music:State.music};
    for(const cid in State.messages){
      lite.messages[cid]=State.messages[cid].map(m=>{
        const o={id:m.id,senderId:m.senderId,order:m.order,type:m.type,text:m.text||'',ts:m.ts,quoteId:m.quoteId,innerThought:m.innerThought,timestampText:m.timestampText,chained:m.chained,color:m.color,tapbacks:m.tapbacks,fileName:m.fileName,size:m.size,dur:m.dur,placeName:m.placeName,lat:m.lat,lng:m.lng,url:m.url,title:m.title,artist:m.artist,songId:m.songId};
        return o;
      });
    }
    localStorage.setItem('rpchat_lite',JSON.stringify(lite));
  }catch(e){/* 超出额度则静默失败 */console.warn('localStorage backup failed',e);}
}
async function tryRestoreFromLocal(){
  try{
    if(State._memoryMode)return false;
    const t=localStorage.getItem('rpchat_lite');
    if(!t)return false;
    const data=JSON.parse(t);
    if(!data||!data.contacts||!data.chats)return false;
    // 检查 IndexedDB 是否空
    const cs=await getAll('contacts');if(cs.length>0)return false;
    // 从 localStorage 恢复
    if(data.me){await put('meta',{id:'me',name:data.me.name,avatar:null,color:data.me.color||null});}
    for(const c of data.contacts||[]) await put('contacts',c);
    for(const c of data.chats||[]) await put('chats',c);
    for(const cid in (data.messages||{})){
      for(const m of data.messages[cid]) await put('messages',m);
    }
    for(const s of data.stickers||[]) await put('stickers',s);
    for(const m of data.music||[]) await put('music',m);
    // 恢复壁纸/主题
    if(data.chatBg){
      await put('meta',{id:'chatBg',css:data.chatBg});
      State.chatBg=data.chatBg;
    }
    if(data.chatTheme){
      await put('meta',{id:'chatTheme',theme:data.chatTheme});
      State.chatTheme=data.chatTheme;
    }
    applyBgToBody();
    applyThemeColors(State.chatTheme);
    return true;
  }catch(e){console.warn('restore from local failed',e);return false;}
}

/* ===================== 搜索 ===================== */
function doSearch(q){
  q=q.trim().toLowerCase(); if(!q){return;}
  const results=[];
  for(const cid in State.messages){
    State.messages[cid].forEach(m=>{
      if(plainText(m).toLowerCase().includes(q)){results.push({cid,m});}
    });
  }
  const wrap=$('#chat-list');
  if(!results.length){wrap.innerHTML='<div class="empty">未找到匹配的消息</div>';return;}
  wrap.innerHTML='<div class="search-res">'+results.map(r=>{
    const c=State.chats.find(x=>x.id===r.cid);
    return `<div class="sr-item" data-cid="${r.cid}" data-mid="${r.m}"><div class="cn">${esc(chatTitle(c))} · ${esc(contactName(r.m.senderId))}</div><div class="ct">${esc(plainText(r.m)).slice(0,60)}</div></div>`;
  }).join('')+'</div>';
  wrap.querySelectorAll('.sr-item').forEach(it=>it.onclick=()=>{openChat(it.dataset.cid);setTimeout(()=>{const row=$(`.msg-row[data-id="${it.dataset.mid}"]`);if(row)row.scrollIntoView({block:'center'});},200);});
}

  }).observe($('#modal'),{attributes:true,attributeFilter:['class']});
  // 键盘稳定:输入时禁止内容上推
  ta.addEventListener('focus',()=>{/* 保持 */});
  // 监听对话页多选:若 selMode 且有选中,提供菜单入口(长按背景)
  $('#convo-scroll').addEventListener('contextmenu',e=>{if(State.selMode&&State.selIds.size>0){e.preventDefault();selectMenu();}});
  // 当进入多选且已选,点击空白处也可弹出菜单(长按背景)
  document.addEventListener('selectionchange',()=>{});
  // 多选模式下,点击空白区域弹出操作菜单
  $('#convo-scroll').addEventListener('pointerlongpressnone',()=>{});
  // 提供一个隐藏的全局多选菜单触发:双击标题栏进入多选?简化:长按消息已可进入;此处在 selMode 下点击空白给出菜单
  $('#view-chat').addEventListener('pointerdown',e=>{
    if(State.selMode && State.selIds.size>0 && !e.target.closest('.msg-row')){ /* 避免误触 */ }
  });
  // 多选操作:通过长按消息后"多选"进入;进入后再次长按空白弹菜单
  $('#convo-scroll').addEventListener('pointerdown',e=>{
    if(State.selMode && State.selIds.size>0 && e.target.closest('#convo-scroll') && !e.target.closest('.msg-row')){
      // 长按空白 -> 操作菜单
      let t=setTimeout(()=>selectMenu(),450);
      const cl=()=>{clearTimeout(t);document.removeEventListener('pointerup',cl);document.removeEventListener('pointermove',mv);};
      const mv=ev=>{if(ev.movementY>10){clearTimeout(t);}};
      document.addEventListener('pointerup',cl);document.addEventListener('pointermove',mv);
    }
  });
  // 退出对话时重置面板
  // 全局点击隐藏音乐库
  document.addEventListener('pointerdown',e=>{if(!e.target.closest('#music-lib')&&!e.target.closest('#music-lib-btn'))$('#music-lib').classList.remove('active');});
}

/* ===================== 启动 ===================== */
window.addEventListener('DOMContentLoaded',()=>{init();});
window.addEventListener('beforeunload',()=>{}); // IndexedDB 已即时持久化
</script>
</body>
</html>
